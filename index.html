<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>USÜLSAYAR</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<style>
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#252525;--text:#ddd;--text2:#888;--text3:#555;--border:#333;
  --dum:#D55E00;--tek:#0072B2;--teke:#CC79A7;--teka:#009E73;--tekka:#E69F00;--tahek:#56B4E9;
  --sweep:rgba(255,255,255,.85);--sweep-glow:rgba(255,255,255,.2);
  --ctrl-bg:#222;--ctrl-thumb:#ccc;--ctrl-track:#444;
}
[data-theme="light"]{
  --bg:#f4f2ed;--bg2:#e8e5df;--bg3:#dbd8d2;--text:#222;--text2:#666;--text3:#999;--border:#ccc;
  --dum:#B84E00;--tek:#005A90;--teke:#A85A88;--teka:#007A5A;--tekka:#C08500;--tahek:#3A8FC0;
  --sweep:rgba(0,0,0,.75);--sweep-glow:rgba(0,0,0,.12);
  --ctrl-bg:#e0ddd7;--ctrl-thumb:#555;--ctrl-track:#bbb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  display:grid;
  grid-template-columns:56px 1fr 56px;
  grid-template-rows:1fr auto auto auto;
  grid-template-areas:
    "lh viz rh"
    "car car car"
    "ctrl ctrl ctrl"
    "foot foot foot";
  /* VUR overlays ctrl row on desktop */
  height:100dvh;overflow:hidden;
  transition:background .3s,color .3s;
  user-select:none;
}
.mobile-toggle{display:none}
.controls-panel{display:flex;align-items:center;gap:10px;flex:1;justify-content:flex-end}
.controls-panel:last-of-type{justify-content:flex-start}
/* ── Compact (mobile) mode — activated by JS when header overflows ── */
[data-compact="true"]{grid-template-columns:0 1fr 0;grid-template-rows:1fr auto auto auto auto;grid-template-areas:"lh viz rh" "vur vur vur" "car car car" "ctrl ctrl ctrl" "foot foot foot"}
[data-compact="true"] .hand-guide{position:absolute!important;width:40px!important;opacity:.15!important;z-index:0;pointer-events:none}
[data-compact="true"] .hand-guide--left{left:0;top:0;bottom:0}
[data-compact="true"] .hand-guide--right{right:0;top:0;bottom:0}
[data-compact="true"] .mobile-toggle{
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  height:30px;padding:0 10px;border:none;border-radius:0;
  background:transparent;color:var(--text2);cursor:pointer;flex-shrink:0;
  touch-action:none;font-size:13px;font-weight:600;gap:4px;
  position:relative;overflow:visible;isolation:isolate;
  transition:color .2s;
}
[data-compact="true"] .mobile-toggle::before{
  content:"";position:absolute;
  top:0;left:-14px;right:-14px;bottom:-200px;
  background:transparent;border:none;border-radius:0;
  z-index:-1;
  transition:background 340ms cubic-bezier(.22,1,.36,1);
}
[data-compact="true"] .mobile-toggle:active::before{background:transparent}
[data-compact="true"] .mobile-toggle[aria-expanded="true"]{color:var(--text)}
[data-compact="true"] .mobile-toggle[aria-expanded="true"]::before{
  background:transparent;
}
@keyframes lavaMove1{
  0%  {background-position:0% 0%,   100% 100%, 100% 0%,  0% 100%, 0% 50%,  100% 50%, 0% 0%}
  20% {background-position:15% 70%,  85% 15%,   80% 55%,  20% 35%, 10% 85%, 90% 25%,  0% 0%}
  40% {background-position:25% 25%,  75% 85%,   85% 80%,  15% 10%, 0% 20%,  100% 75%, 0% 0%}
  60% {background-position:5% 90%,   95% 40%,   90% 20%,  10% 70%, 20% 60%, 80% 10%,  0% 0%}
  80% {background-position:20% 45%,  80% 65%,   75% 65%,  25% 80%, 5% 30%,  95% 85%,  0% 0%}
  100%{background-position:0% 0%,   100% 100%, 100% 0%,  0% 100%, 0% 50%,  100% 50%, 0% 0%}
}
@keyframes lavaMove2{
  0%  {background-size:140% 300%, 140% 300%, 140% 300%, 140% 300%, 140% 300%, 140% 300%, 100% 100%}
  25% {background-size:140% 400%, 140% 250%, 140% 350%, 140% 270%, 140% 330%, 140% 380%, 100% 100%}
  50% {background-size:140% 260%, 140% 380%, 140% 270%, 140% 360%, 140% 400%, 140% 250%, 100% 100%}
  75% {background-size:140% 350%, 140% 320%, 140% 400%, 140% 250%, 140% 270%, 140% 340%, 100% 100%}
  100%{background-size:140% 300%, 140% 300%, 140% 300%, 140% 300%, 140% 300%, 140% 300%, 100% 100%}
}
.toggle-cell{display:flex;align-items:center}
.toggle-cell--left{justify-content:flex-end}
.toggle-cell--right{justify-content:flex-start;gap:4px;transition:opacity .3s ease}
.toggle-note{display:flex;align-items:center;opacity:.5}
.toggle-note svg{height:14px;width:auto;fill:currentColor}
[data-compact="true"] .mobile-toggle[aria-expanded="true"] .toggle-cell--right{opacity:0!important}
#toggleBpm{font-variant-numeric:tabular-nums}
.toggle-chev{opacity:.5;transition:transform .3s cubic-bezier(.22,1,.36,1)}
[data-compact="true"] .mobile-toggle[aria-expanded="true"] .toggle-chev{transform:rotate(180deg);opacity:.8}
[data-compact="true"] .btn-play{grid-area:vur;justify-self:center;align-self:center;position:relative;left:auto;top:auto;transform:none}
[data-compact="true"] .controls{justify-content:center;gap:8px;flex-wrap:wrap;position:relative;overflow:hidden}
[data-compact="true"] #headerToggle{display:none!important}
[data-compact="true"] .controls-panel{
  display:none;width:100%;flex-direction:column;align-items:center;gap:8px;
  padding-top:8px;border-top:1px solid var(--border);
}
[data-compact="true"] .controls-panel.open{display:contents}
[data-compact="true"] .controls:has(.controls-panel.open){
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:8px 14px;align-content:start;overflow:visible;
  z-index:auto;position:relative;
}
[data-compact="true"] .controls:has(.controls-panel.open) #headerToggle{display:none!important}
[data-compact="true"] .controls-panel .slider-group,[data-compact="true"] .controls:has(.controls-panel.open) .slider-group{justify-content:center}
#lavaOverlay{
  display:block;grid-column:1/-1;grid-row:3/5;
  z-index:9;opacity:.6;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 80% at 15% 30%, var(--tek) 0%, transparent 50%),
    radial-gradient(ellipse 60% 90% at 85% 70%, var(--dum) 0%, transparent 50%),
    radial-gradient(ellipse 50% 80% at 65% 10%, var(--dum) 0%, transparent 45%),
    radial-gradient(ellipse 50% 70% at 35% 90%, var(--tek) 0%, transparent 45%),
    radial-gradient(ellipse 40% 90% at 5% 60%, var(--tek) 0%, transparent 40%),
    radial-gradient(ellipse 40% 80% at 95% 20%, var(--dum) 0%, transparent 40%),
    linear-gradient(to right, var(--tek), var(--dum));
  background-size:140% 300%, 140% 300%, 140% 300%, 140% 300%, 140% 300%, 140% 300%, 100% 100%;
  filter:blur(40px) saturate(1);
  transition:opacity 600ms ease;
  animation:lavaMove1 23s ease-in-out infinite,lavaMove2 17s ease-in-out infinite;
}
[data-compact="true"] #lavaOverlay{grid-row:4/6;opacity:.75}
[data-compact="true"] .controls:has(.controls-panel.open) ~ #lavaOverlay{opacity:.35}
[data-compact="true"] .controls:has(.controls-panel.open) .slider-group,
[data-compact="true"] .controls:has(.controls-panel.open) #renderPanel{background:transparent!important;border-color:transparent!important;pointer-events:none}
[data-compact="true"] .controls:has(.controls-panel.open) .slider-group .mute-label,
[data-compact="true"] .controls:has(.controls-panel.open) .slider-group .group-icon,
[data-compact="true"] .controls:has(.controls-panel.open) .slider-group .group-expand,
[data-compact="true"] .controls:has(.controls-panel.open) #renderPanel .btn-save,
[data-compact="true"] .controls:has(.controls-panel.open) #renderPanel .group-expand{pointer-events:auto}
[data-compact="true"] .controls:has(.controls-panel.open) .slider-group:has(:hover),
[data-compact="true"] .controls:has(.controls-panel.open) .slider-group:has(:active),
[data-compact="true"] .controls:has(.controls-panel.open) #renderPanel:has(:hover),
[data-compact="true"] .controls:has(.controls-panel.open) #renderPanel:has(:active){z-index:10}
[data-compact="true"] .app-footer:has(.mobile-toggle[aria-expanded="true"]) button:hover,
[data-compact="true"] .app-footer:has(.mobile-toggle[aria-expanded="true"]) button:active{position:relative;z-index:10}
[data-compact="true"] .app-footer:has(.mobile-toggle[aria-expanded="true"]) .footer-left,
[data-compact="true"] .app-footer:has(.mobile-toggle[aria-expanded="true"]) .footer-right{z-index:10}
[data-compact="true"] #tekGroup{order:1;transform:translate(var(--align-x,0px),36px)}
[data-compact="true"] #dumGroup{order:2;transform:translate(calc(-1 * var(--align-x,0px)),36px)}
[data-compact="true"] #bpmGroup{order:3;transform:translate(var(--align-x,0px),14px)}
[data-compact="true"] #renderPanel{order:4;display:flex;align-items:center;gap:6px;justify-content:center;transform:translate(calc(-1 * var(--align-x,0px)),14px)}
[data-compact="true"] .controls:has(.controls-panel.open) #renderPanel{background:transparent!important;border-color:transparent!important}
[data-compact="true"] #renderPanel>.group-expand-handle{display:none}
[data-compact="true"] #renderPanel .group-expand{max-width:none!important;opacity:1!important}
[data-compact="true"] #renderPanel .btn-save{width:34px;height:34px;order:-1}
[data-compact="true"] .mode-group #volumeGroup .group-icon{font-size:16px;z-index:2}
[data-compact="true"] .mode-group #volumeGroup .group-expand{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:46px;height:46px;max-width:none;border-radius:50%;
  padding:0;border:none;overflow:visible;
  background:transparent;display:block;box-sizing:border-box;
  opacity:0;pointer-events:none;
  transition:opacity .15s ease;
}
[data-compact="true"] .mode-group #volumeGroup.vol-knob .group-expand{opacity:1}
@media(hover:hover){[data-compact="true"] .mode-group #volumeGroup:hover .group-expand{opacity:.15}
[data-compact="true"] .mode-group #volumeGroup.vol-knob:hover .group-expand{opacity:1}}
@media(hover:none),(pointer:coarse){[data-compact="true"] .mode-group #volumeGroup .group-expand{opacity:.15}
[data-compact="true"] .mode-group #volumeGroup.vol-knob .group-expand{opacity:1}}
[data-compact="true"] .mode-group #volumeGroup .group-expand input[type="range"]{display:none}
[data-compact="true"] .mode-group #volumeGroup .vol-ring{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 220deg,color-mix(in srgb,var(--tek) calc((1 - var(--vol,1)) * 100%),var(--dum)) 0deg,color-mix(in srgb,var(--tek) calc((1 - var(--vol,1)) * 100%),var(--dum)) calc(var(--vol,1) * 280deg),var(--bg2) calc(var(--vol,1) * 280deg),var(--bg2) 280deg,transparent 280deg);
  -webkit-mask:radial-gradient(circle,transparent 58%,#000 60%);
  mask:radial-gradient(circle,transparent 58%,#000 60%);
}
[data-compact="true"] .app-footer{flex-wrap:wrap;justify-content:flex-start}
[data-compact="true"] .app-footer:has(.mobile-toggle[aria-expanded="true"]){flex-wrap:wrap-reverse;overflow:visible}
[data-compact="true"] .footer-left{position:absolute;left:14px;bottom:6px;font-size:12px;white-space:nowrap;z-index:11}
[data-compact="true"] .footer-center{display:contents}
[data-compact="true"] #footerToggle{order:4;flex-basis:100%;position:relative;z-index:1}
[data-compact="true"] .mode-group{display:none}
[data-compact="true"] .app-footer:has(.mobile-toggle[aria-expanded="true"]) .mode-group{display:flex;order:5;gap:62px;flex-shrink:0;flex-basis:100%;justify-content:center;position:relative}
[data-compact="true"] .mode-group #volumeGroup{position:absolute;left:50%;top:50%;transform:translate(-50%,calc(-50% - 96px));width:auto;min-width:auto;height:auto;min-height:auto;padding:0;border:none;background:transparent;z-index:8}
[data-compact="true"] .mode-group #volumeGroup:has(:hover),
[data-compact="true"] .mode-group #volumeGroup:has(:active){z-index:10}
[data-compact="true"] .footer-right{position:absolute;right:14px;bottom:6px;font-size:12px;text-align:right;white-space:nowrap;z-index:11}
[data-compact="true"] #renderStatus{display:none}
[data-compact="true"] .controls:has(.controls-panel.open) #renderStatus.marquee:not(:empty){display:block;position:absolute;top:28px;left:0;right:0;font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;line-height:16px;height:16px;pointer-events:none}
@keyframes status-marquee{from{transform:translateX(0)}to{transform:translateX(-100%)}}
[data-compact="true"] #renderStatus.marquee>span{display:inline-block;padding-left:100%;animation:status-marquee 8s linear 1 forwards}

/* ── Desktop bar overrides ── */
body:not([data-compact="true"]) .controls{min-height:60px;background:transparent;border-top:none;gap:0}
body:not([data-compact="true"]) .controls-panel{gap:44px;flex:1}
body:not([data-compact="true"]) #controlsPanel{justify-content:flex-end;padding-right:calc(44px + 37.5px)}
body:not([data-compact="true"]) #controlsPanel2{justify-content:flex-start;padding-left:calc(44px + 37.5px)}
body:not([data-compact="true"]) .btn-play{grid-area:ctrl;justify-self:center;align-self:center;z-index:20}
body:not([data-compact="true"]) .controls{background:transparent;border-top:none;z-index:auto;pointer-events:none}
body:not([data-compact="true"]) .controls .slider-group,
body:not([data-compact="true"]) .controls #renderPanel,
body:not([data-compact="true"]) .app-footer #renderPanel{pointer-events:auto;opacity:.66;transition:opacity .25s ease}
body:not([data-compact="true"]) .controls .slider-group.open{background:color-mix(in srgb,var(--bg3) 33%,transparent);border-color:color-mix(in srgb,var(--border) 33%,transparent)}
body:not([data-compact="true"]) .controls .slider-group.open>.group-expand-handle{opacity:.2}
body:not([data-compact="true"]) .controls .slider-group.open,
body:not([data-compact="true"]) .controls #renderPanel.open,
body:not([data-compact="true"]) .app-footer #renderPanel.open{z-index:10}
body:not([data-compact="true"]) .controls .slider-group:hover,
body:not([data-compact="true"]) .controls .slider-group:has(:active),
body:not([data-compact="true"]) .controls #renderPanel:hover,
body:not([data-compact="true"]) .controls #renderPanel:has(:active),
body:not([data-compact="true"]) .app-footer #renderPanel:hover,
body:not([data-compact="true"]) .app-footer #renderPanel:has(:active){z-index:10;opacity:1}
body:not([data-compact="true"]) .theme-btn:hover,
body:not([data-compact="true"]) .disk-btn:hover,
body:not([data-compact="true"]) .btn-save:hover{z-index:10}
body:not([data-compact="true"]) .carousel{background:transparent;border-top:none}
body:not([data-compact="true"]) .app-footer{height:74px;min-height:auto;background:transparent;border-top:none;z-index:auto;justify-content:center}
body:not([data-compact="true"]) .footer-left,body:not([data-compact="true"]) .footer-right{position:absolute;z-index:10}
body:not([data-compact="true"]) .footer-center{position:relative}
body:not([data-compact="true"]) #renderStatus{position:absolute;left:100%;margin-left:8px;top:50%;transform:translateY(-50%);white-space:nowrap;pointer-events:none;z-index:10}
/* ── Mobile bar overrides ── */
[data-compact="true"] .controls{background:transparent;border-top:none}
[data-compact="true"] .carousel{background:transparent;border-top:none;position:relative;z-index:10}
[data-compact="true"] .carousel-arrow{display:none}
[data-compact="true"] .app-footer{background:transparent;border-top:none;overflow:hidden}
[data-compact="true"] .viz-area{gap:10px;padding-bottom:2px;padding-top:4px}
/* ── Mobile: groups always open, no collapse, no arrows, symmetric padding ── */
[data-compact="true"] .slider-group{gap:6px;border-color:var(--border);padding:6px 8px;background:var(--bg3)}
[data-compact="true"] #volumeGroup{border-color:var(--border);background:var(--bg3)}
[data-compact="true"] .group-expand:not(#volumeGroup .group-expand){max-width:none!important;opacity:1!important;overflow:visible}
[data-compact="true"] .group-expand-handle{display:none!important}

/* ── Controls ── */
.controls{
  grid-area:ctrl;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 14px;background:var(--bg2);border-top:1px solid var(--border);
  flex-wrap:wrap;z-index:10;
}
@property --btn-mix{syntax:'<number>';inherits:true;initial-value:0}
.btn-play{
  width:60px;height:60px;border:none;border-radius:50%;
  font-size:15px;font-weight:800;letter-spacing:1px;cursor:pointer;
  background:linear-gradient(145deg,color-mix(in srgb,color-mix(in srgb,var(--tek) calc(var(--btn-mix) * 100%),var(--dum)) 85%,#fff),color-mix(in srgb,var(--tek) calc(var(--btn-mix) * 100%),var(--dum)));
  color:#fff;transition:--btn-mix var(--btn-trans,400ms) ease var(--btn-delay,0ms),transform .15s ease;
  position:relative;z-index:20;
  box-shadow:0 4px 14px color-mix(in srgb,color-mix(in srgb,var(--tek) calc(var(--btn-mix) * 100%),var(--dum)) 40%,transparent),
    inset 0 1px 0 color-mix(in srgb,#fff 20%,transparent);
  text-shadow:0 1px 2px rgba(0,0,0,.2);
}
.btn-play:active{transform:scale(.92);box-shadow:0 1px 4px color-mix(in srgb,color-mix(in srgb,var(--tek) calc(var(--btn-mix) * 100%),var(--dum)) 30%,transparent),inset 0 2px 6px rgba(0,0,0,.15)}
[data-playing="false"] .btn-play{animation:vur-breathe 2.4s cubic-bezier(.4,0,.6,1) infinite}
@keyframes vur-breathe{0%,100%{transform:scale(1)}55%{transform:scale(1.22)}}
[data-playing="true"] .btn-play{animation:none}
.slider-group,.render-row{position:relative}
.slider-group{
  display:flex;align-items:center;gap:0;font-size:12px;color:var(--text2);
  border:1px solid transparent;border-radius:8px;padding:0;background:transparent;
  transition:border-color .25s,background .25s,padding .25s,gap .25s;
}
.slider-group.open{gap:6px;border-color:var(--border);padding:6px 8px;background:var(--bg3)}
#bpmGroup.open,#tekGroup.open{padding-right:22px}
#dumGroup.open{padding-left:22px}
/* ── Collapsible group expand ── */
.group-expand{
  display:flex;align-items:center;gap:6px;
  overflow:hidden;max-width:0;opacity:0;
  transition:max-width .3s cubic-bezier(.4,0,.2,1),opacity .2s ease;
  white-space:nowrap;
}
.slider-group.open .group-expand,.render-row.open .group-expand{max-width:170px;opacity:1}
#volumeGroup .group-expand{transition:max-width .15s cubic-bezier(.4,0,.2,1),opacity .1s ease}
#volumeGroup.open .group-expand{max-width:145px}
#renderPanel.open .group-expand{max-width:110px}
.group-expand-handle{
  position:absolute;top:0;bottom:0;width:16px;
  display:flex;align-items:center;justify-content:center;
  background:none;border:none;padding:0;color:var(--text3);
  cursor:pointer;z-index:2;
  opacity:0;pointer-events:none;transition:opacity .2s,background .2s;
  border-radius:4px;
}
.slider-group.open>.group-expand-handle,.render-row.open>.group-expand-handle{opacity:.6;pointer-events:auto;background:color-mix(in srgb,var(--text3) 10%,transparent)}
.group-expand-handle:hover{opacity:1!important;background:color-mix(in srgb,var(--text3) 20%,transparent)!important}
.group-expand-handle:active{opacity:1!important;background:color-mix(in srgb,var(--text3) 30%,transparent)!important}
[data-expand="rtl"]>.group-expand-handle{left:0}
[data-expand="ltr"]>.group-expand-handle{right:0}
#bpmGroup>.group-expand-handle,#tekGroup>.group-expand-handle{left:auto;right:0}
#dumGroup>.group-expand-handle{right:auto;left:0}
.group-expand-handle svg{width:10px;height:100%;max-height:48px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.slider-group label{width:62px;text-align:right;flex-shrink:0}
.slider-group label.mute-label{width:34px;min-width:34px}
.icon-group{position:relative}
.group-icon{
  font-size:18px;flex-shrink:0;cursor:pointer;
  width:34px;height:34px;border-radius:50%;box-sizing:border-box;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--border);background:var(--bg3);
  color:var(--text);transition:border-color .15s,background .15s,transform .1s;
  position:relative;z-index:3;
}
.group-icon:hover{border-color:inherit;background:var(--bg3)}
.group-icon:active{transform:scale(.92)}
@keyframes bpm-pulse{0%{transform:scale(1)}15%{transform:scale(1.35)}100%{transform:scale(1)}}
#bpmIcon.pulse,#volumeIcon.pulse{animation:bpm-pulse .25s ease-out}
@keyframes mute-pulse{0%{transform:scale(1);opacity:1}15%{transform:scale(1.25);opacity:1}100%{transform:scale(1);opacity:1}}
.mute-label.pulse{animation:mute-pulse .2s ease-out}
@keyframes ring-pulse{0%{transform:scale(1)}15%{transform:scale(var(--pulse-scale,1.04))}100%{transform:scale(1)}}
.viz-container.ring-pulse{animation:ring-pulse var(--pulse-dur,.25s) ease-out}
.slider-group input[type="range"]{
  -webkit-appearance:none;appearance:none;width:126px;height:6px;
  background:var(--ctrl-track);border-radius:3px;outline:none;cursor:pointer;
}
.slider-group input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--ctrl-thumb);cursor:pointer;
}
.slider-group input[type="range"]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;border:none;
  background:var(--ctrl-thumb);cursor:pointer;
}
#volumeGroup input[type="range"]{height:22px;background:transparent}
#volumeGroup input[type="range"]::-webkit-slider-runnable-track{height:6px;background:var(--ctrl-track);border-radius:3px}
#volumeGroup input[type="range"]::-webkit-slider-thumb{width:22px;height:22px;margin-top:-8px}
#volumeGroup input[type="range"]::-moz-range-track{height:6px;background:var(--ctrl-track);border-radius:3px}
#volumeGroup input[type="range"]::-moz-range-thumb{width:22px;height:22px}
#bpmGroup,#tekGroup,#dumGroup{padding:6px 8px;gap:6px}
#volumeGroup{width:184px;min-width:184px;height:48px;min-height:48px;padding:6px 8px;gap:6px}
.spinbox-wrap{position:relative;display:inline-flex;align-items:center}
.spinbox{
  width:58px;padding:2px 26px 2px 4px;font-size:12px;text-align:center;
  background:var(--ctrl-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;
}
#tekGroup .spinbox,#dumGroup .spinbox{padding-left:0;padding-right:21px}
#bpmGroup .spinbox{padding-left:0}
.spinbox::-webkit-inner-spin-button,.spinbox::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.spinbox{-moz-appearance:textfield}
.spinbox-unit{position:absolute;right:5px;font-size:11px;font-weight:600;color:var(--text2);pointer-events:none}
#tekGroup .spinbox-unit,#dumGroup .spinbox-unit{right:auto;left:35px}
.bpm-step-btn{
  width:28px;height:28px;border:1px solid var(--border);border-radius:50%;
  background:var(--bg3);color:var(--text);font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.bpm-step-btn:active{background:var(--ctrl-track)}
.repeat-step-btn{width:22px;height:22px;font-size:13px}
[data-compact="true"] .repeat-step-btn{width:32px;height:32px;font-size:15px}
/* Vertical reel spinbox */
.vreel{touch-action:none;user-select:none;cursor:ns-resize;width:56px}
.vreel .spinbox{display:none}
.vreel-window{width:30px;height:48px;overflow:hidden;position:relative;
  -webkit-mask-image:linear-gradient(to bottom,transparent 2%,black 28%,black 72%,transparent 98%);
  mask-image:linear-gradient(to bottom,transparent 2%,black 28%,black 72%,transparent 98%)}
.vreel-reel{position:relative;height:48px;will-change:transform}
.vreel-cell{height:16px;line-height:16px;text-align:center;font-size:12px;color:var(--text3);white-space:nowrap;width:30px;position:absolute;top:16px;left:0}
.vreel .spinbox-unit{position:static;right:auto;left:auto;margin-left:2px;text-align:left}
.vreel-edit{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:22px;box-sizing:border-box;
  text-align:center;font-size:15px;font-weight:700;background:var(--bg);border:1px solid var(--tek);
  border-radius:4px;color:var(--text);outline:none;z-index:2;padding:0;font-family:inherit;
  -moz-appearance:textfield}
.vreel-edit::-webkit-inner-spin-button,.vreel-edit::-webkit-outer-spin-button{-webkit-appearance:none}
.mute-label{
  cursor:pointer;user-select:none;
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;
  border:1.5px solid;background:var(--bg3);
  position:relative;z-index:3;
  transition:opacity .2s,background .15s,transform .1s,border-color .15s;
}
.mute-label[data-voice="dum"]{color:var(--dum);border-color:var(--dum)}
.mute-label[data-voice="tek"]{color:var(--tek);border-color:var(--tek)}
.mute-label:hover{background:var(--bg3)}
.mute-label:active{transform:scale(.92)}
.mute-label[aria-pressed="true"]{opacity:.3;text-decoration:line-through}
.mode-group{display:flex;align-items:center;gap:6px}
.disk-btn,.theme-btn{
  width:34px;height:34px;border:1px solid var(--border);
  border-radius:50%;background:var(--bg3);color:var(--text);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;
}
/* ── 48px touch targets (Apple HIG 44px + Material 48dp) ── */
.mute-label::after,.group-icon::after,.btn-save::after,.disk-btn::after,.theme-btn::after{
  content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:48px;height:48px;border-radius:50%;
}
.disk-btn[aria-pressed="true"]{border-color:var(--dum);color:var(--dum)}
.disk-icon{display:block;width:16px;height:16px;flex-shrink:0}
@keyframes disk-spin{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
[data-playing="false"] .disk-btn[aria-pressed="true"] .disk-icon{animation:disk-spin 3s linear infinite}

/* ── Hand Guidance ── */
.hand-guide{
  display:flex;align-items:flex-start;justify-content:center;padding:12px 0;
  transition:opacity .4s;
}
.hand-guide--left{grid-area:lh}
.hand-guide--right{grid-area:rh}
[data-playing="false"] .hand-guide{opacity:.15}
.hand-bar{
  width:10px;height:100%;border-radius:5px;
  transform-origin:top;transform:scaleY(0);
  transition:transform .06s ease-out;
}
.hand-guide--left .hand-bar{background:var(--tek)}
.hand-guide--right .hand-bar{background:var(--dum)}

/* ── Visualization ── */
.viz-area{
  grid-area:viz;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  position:relative;min-height:0;min-width:0;padding:8px;padding-bottom:16px;gap:16px;overflow:hidden;
}
.viz-container{position:relative;width:min(90%,50vh);aspect-ratio:1;flex-shrink:1;min-height:0;min-width:0}
.segment-ring,.sweep-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.sweep-canvas{pointer-events:none}
[data-playing="false"] .sweep-canvas{opacity:0;transition:opacity .3s}
[data-playing="true"] .sweep-canvas{opacity:1;transition:opacity .15s}
.segment-ring{transform-origin:center;will-change:transform}
[data-playing="false"] .seg-path{cursor:pointer}
[data-playing="false"] .seg-path:hover{filter:brightness(1.25)}
[data-playing="false"] .seg-path:active{filter:brightness(.85)}
.seg-locked{pointer-events:none}
.segment path{transition:filter .15s ease-out,opacity .15s ease-out;stroke:var(--bg);stroke-width:.8}
@keyframes seg-flash{
  0%{filter:brightness(1.6) saturate(1.4);transform-origin:center;transform:scale(1.03);opacity:1}
  40%{filter:brightness(1.25) saturate(1.15);transform:scale(1.01);opacity:1}
  100%{filter:brightness(1) saturate(1);transform:scale(1);opacity:1}
}
.seg-path.flash{animation:seg-flash .35s ease-out forwards}

/* ── Beat Info ── */
.beat-info{
  width:100%;max-width:calc(100% - 32px);
  text-align:center;padding:4px 0;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  justify-content:flex-end;overflow:hidden;z-index:5;flex-shrink:0;
  min-height:52px;
}
.beat-info:has(.fitted){justify-content:flex-end}
.beat-labels{
  white-space:nowrap;line-height:1.3;font-weight:600;
  display:flex;gap:0;justify-content:center;
}
.beat-labels.marquee{
  justify-content:flex-start;
  position:relative;
}
.beat-labels.fitted{
  white-space:normal;flex-wrap:wrap;justify-content:flex-start;
  display:-webkit-inline-box;display:inline-flex;flex-wrap:wrap;
}
.beat-labels span{
  transition:background .08s,color .08s;padding:1px 3px;border-radius:3px;
}
.beat-labels span.active{background:var(--active-bg);color:var(--bg)!important}
.beat-labels .sep{color:var(--text3);padding:0;font-weight:400}
.beat-labels .sep-dash{padding:0 1px}
.beat-info:has(.aligned),body:not([data-compact="true"]) .beat-info:has(.marquee){margin-top:-12px;min-height:auto;justify-content:flex-start;padding-top:0}
body:not([data-compact="true"]) .beat-labels.marquee{height:24px}
.beat-labels.aligned{position:relative;white-space:normal;height:24px;width:100%}
.beat-labels.aligned > .sep{display:none}
.beat-labels.aligned > span[style*="position"]{white-space:nowrap}
.beat-labels.aligned .sep-dash{position:absolute;transform:translateX(-50%)}

/* ── Carousel ── */
.carousel{
  grid-area:car;display:flex;align-items:center;justify-content:center;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:2px 0;gap:0;height:44px;
}
.carousel-inner{
  display:flex;align-items:center;justify-content:center;
  width:min(100%,780px);height:100%;
}
.carousel-arrow{
  width:40px;height:100%;border:none;background:transparent;
  color:var(--text3);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s,transform .1s;
}
.carousel-arrow:hover{color:var(--text)}
.carousel-arrow:active{transform:scale(.9)}
.carousel-arrow svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;fill:none}
.carousel-track{
  position:relative;
  display:flex;align-items:center;
  width:100%;height:100%;
  overflow:hidden;
  cursor:grab;touch-action:pan-y;
  -webkit-mask-image:linear-gradient(to right,transparent 2%,black 20%,black 80%,transparent 98%);
  mask-image:linear-gradient(to right,transparent 2%,black 20%,black 80%,transparent 98%);
}
.carousel-track.dragging{cursor:grabbing}
.car-reel{
  display:flex;align-items:center;
  gap:30px;
  position:absolute;left:50%;
  will-change:transform;
}
.car-item{
  white-space:nowrap;cursor:pointer;flex-shrink:0;
  will-change:transform,opacity;position:relative;
  line-height:1;font-size:14px;font-weight:600;color:var(--text2);
}
.car-item .car-units{
  position:absolute;left:100%;top:0;margin-left:1px;
  font-size:9px;font-weight:700;opacity:.5;
}

/* ── Menu animations ── */
@keyframes menuIn{from{opacity:0;translate:0 10px}to{opacity:1;translate:0 0}}
@keyframes menuOut{from{opacity:1;translate:0 0}to{opacity:0;translate:0 10px}}
@keyframes togglePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
[data-compact="true"] #footerToggle:not([data-touched]){animation:togglePulse 2.4s ease-in-out infinite}
[data-compact="true"] .controls-panel.entering .slider-group{animation:menuIn .28s ease-out both}
[data-compact="true"] .controls-panel.entering #tekGroup{animation-delay:0s}
[data-compact="true"] .controls-panel.entering #dumGroup{animation-delay:.05s}
[data-compact="true"] .controls-panel.entering #bpmGroup{animation-delay:.1s}
[data-compact="true"] .controls-panel.entering #volumeGroup{animation-delay:.15s}
[data-compact="true"] .controls-panel.exiting .slider-group{animation:menuOut .2s ease-in both}
[data-compact="true"] .controls-panel.exiting #volumeGroup{animation-delay:0s}
[data-compact="true"] .controls-panel.exiting #bpmGroup{animation-delay:.04s}
[data-compact="true"] .controls-panel.exiting #dumGroup{animation-delay:.08s}
[data-compact="true"] .controls-panel.exiting #tekGroup{animation-delay:.12s}
[data-compact="true"] #renderPanel.entering{animation:menuIn .25s ease-out both}
[data-compact="true"] .mode-group.entering{animation:menuIn .25s ease-out both;animation-delay:.06s}
[data-compact="true"] #renderPanel.exiting{animation:menuOut .18s ease-in both}
[data-compact="true"] .mode-group.exiting{animation:menuOut .18s ease-in both}

/* ── Footer ── */
.app-footer{
  grid-area:foot;padding:6px 14px;background:var(--bg2);
  border-top:1px solid var(--border);font-size:14px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;gap:6px;

}
.footer-left{position:absolute;left:14px;bottom:6px;white-space:nowrap}
.footer-center{display:flex;align-items:center;gap:8px}
.footer-right{position:absolute;right:14px;bottom:6px;white-space:nowrap}
.footer-left a{color:var(--dum);text-decoration:none}
.footer-left a:hover{text-decoration:underline}
.footer-left a:active{color:var(--tek)}
.footer-center{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.render-row{display:flex;align-items:center;flex-wrap:wrap;justify-content:center;order:-1}
body:not([data-compact="true"]) #renderPanel{padding:0;gap:0;border:none;border-radius:8px;background:transparent}
body:not([data-compact="true"]) #renderPanel.open{padding:6px 8px;padding-right:22px;gap:6px;border:1px solid color-mix(in srgb,var(--border) 33%,transparent);background:color-mix(in srgb,var(--bg3) 33%,transparent)}
body:not([data-compact="true"]) #renderPanel.open>.group-expand-handle{opacity:.2}
body:not([data-compact="true"]) #renderPanel>.group-expand-handle{left:auto;right:0}
#repeatCount{width:42px;padding-right:14px;padding-left:2px}
#renderPanel .spinbox-unit{right:4px;font-size:15px;color:var(--text)}
.btn-save{
  width:34px;height:34px;border:1px solid var(--border);border-radius:50%;
  background:var(--bg3);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,background .15s,transform .1s;padding:0;
  position:relative;z-index:3;
}
.btn-save:hover{border-color:inherit;background:var(--bg3)}
.btn-save:active{transform:scale(.92)}
.btn-save svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.render-status{font-size:11px;color:var(--text2)}
.render-status:empty{display:none}
@keyframes status-fade{0%,20%{opacity:1}50%{opacity:.6}100%{opacity:0}}
.render-status.fading{animation:status-fade 10s ease-out forwards}
.footer-right{white-space:nowrap}
.footer-right a{color:var(--tek);text-decoration:none}
.footer-right a:hover{text-decoration:underline}
.footer-right a:active{color:var(--dum)}
/* ── Notation display (OSMD) ── */
.notation-row{
  display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;
  width:100%;max-width:calc(100% - 32px);
}

.notation-speeds button.active{border-color:var(--tek);background:var(--bg2);color:var(--text)}

<script>
// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════

const BPM_MIN = 33;

const FREQ_MAX = 333;

const MAX_MASTER_GAIN = Math.pow(10, -0.3 / 20);

const LOOKAHEAD_MS = 25;

const ENV_FLOOR = 0.0001;

const DUM_OSC1_TYPE = "sine";
const DUM_OSC2_TYPE = "triangle";
const DUM_FREQ_START1_MUL = 1.28;
const DUM_FREQ_START2_MUL = 1.24;

const DUM_SWEEP1_TIME = 0.018;
const DUM_SWEEP2_TIME = 0.022;

const DUM_ENV_ATTACK = 0.002;
const DUM_ENV_HOLD = 0.004;
const DUM_ENV_BODY_MUL = 0.22;
const DUM_ENV_BODY_MIN = 0.03;
const DUM_ENV_BODY_MAX = 0.18;
const DUM_ENV_TAIL_MUL = 0.60;
const DUM_ENV_TAIL_MIN = 0.05;
const DUM_ENV_TAIL_MAX = 0.75;
const DUM_ENV_PEAK = 0.95;
const DUM_ENV_BODY_LEVEL = 0.22;

const TEK_OSC1_TYPE = "triangle";
const TEK_OSC2_TYPE = "sine";
const TEK_FREQ_START1_MUL = 1.20;
const TEK_FREQ_START2_MUL = 1.15;
const TEK_FREQ_END2_MUL = 1.01;
const TEK_SWEEP1_TIME = 0.010;
const TEK_SWEEP2_TIME = 0.012;
const TEK_LP_FREQ_MUL = 4.2;
const TEK_LP_FREQ_CAP = 4000;
const TEK_GAIN2_PEAK_RATIO = 0.12;
const TEK_GAIN2_BODY_RATIO = 0.5;
const TEK_NOISE_BP_FREQ = 2400;
const TEK_NOISE_ATTACK = 0.0015;
const TEK_NOISE_PEAK = 0.045;
const TEK_NOISE_DECAY_END = 0.010;
const TEK_MIN_NEXT_HIT = 0.02;

const TEK_SHORT_PROFILE = {
  attack:0.0012,hold:0.0018,bodyDecayMul:0.14,bodyDecayMin:0.015,bodyDecayMax:0.065,
  tailMul:0.34,tailMin:0.018,tailMax:0.16,peak:0.68,bodyLevel:0.13
};
const TEK_LONG_PROFILE = {
  attack:0.0018,hold:0.0032,bodyDecayMul:0.24,bodyDecayMin:0.025,bodyDecayMax:0.13,
  tailMul:0.74,tailMin:0.04,tailMax:0.62,peak:0.70,bodyLevel:0.22
};

const NOISE_Q = 1.2;
const NOISE_STOP_PAD = 0.02;
const OSC_STOP_PAD = 0.02;

const HEK_FREQ_RIGHT_MUL = 1.01;
const HEK_FREQ_LEFT_MUL = 0.99;
const HEK_LEFT_DELAY = 0.004;

// ── Audio Context Setup ─────────────────────────────────────────
const AudioContextClass = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContextClass();

const master = audioCtx.createGain();
master.gain.value = MAX_MASTER_GAIN;

const gate = audioCtx.createGain();
gate.gain.value = 1;

const hp = audioCtx.createBiquadFilter();
hp.type = "highpass";
hp.frequency.value = HP_FREQ;

master.connect(gate);
gate.connect(hp);
hp.connect(audioCtx.destination);

// ── State ───────────────────────────────────────────────────────
let bpm = BPM_DEFAULT;
let dumFreq = 98;
let tekFreq = 147;
let volume = VOL_MAX;
let soloMode = "none";

let isPlaying = false;
let diskMode = false;

function isMaximized() {
  return window.outerWidth >= screen.availWidth - 16
      && window.outerHeight >= screen.availHeight - 16;
}
function shouldAlignLabels() {
  if (document.body.dataset.compact === "true") return false;
  if (!isMaximized()) return false;
  if (!notationNotePositions.length) return false;
  if (isPlaying && diskMode) return false;
  return true;
}
let currentStep = 0;
let nextNoteTime = 0;
let timerId = null;

// Faz 0: UI notification hook
let onScheduledEvent = null;

// Mute state (replaces solo checkboxes)
let dumMuted = false;
let tekMuted = false;

// ── Envelope Cache ──────────────────────────────────────────────
let cachedTekEnvProfile = null;
let cachedTekEnvBpm = null;

function getTekEnvProfile(localBpm) {
  if (cachedTekEnvBpm === localBpm) return cachedTekEnvProfile;
  const bpmNorm = (localBpm - BPM_MIN) / (BPM_MAX - BPM_MIN);
  const mix = 1 - clamp(bpmNorm, 0, 1);
  const s = TEK_SHORT_PROFILE, l = TEK_LONG_PROFILE;
  cachedTekEnvProfile = {
    attack:lerp(s.attack,l.attack,mix),hold:lerp(s.hold,l.hold,mix),
    bodyDecayMul:lerp(s.bodyDecayMul,l.bodyDecayMul,mix),
    bodyDecayMin:lerp(s.bodyDecayMin,l.bodyDecayMin,mix),
    bodyDecayMax:lerp(s.bodyDecayMax,l.bodyDecayMax,mix),
    tailMul:lerp(s.tailMul,l.tailMul,mix),
    tailMin:lerp(s.tailMin,l.tailMin,mix),
    tailMax:lerp(s.tailMax,l.tailMax,mix),
    peak:lerp(s.peak,l.peak,mix),bodyLevel:lerp(s.bodyLevel,l.bodyLevel,mix)
  };
  cachedTekEnvBpm = localBpm;
  return cachedTekEnvProfile;
}

// ── Noise Buffer ────────────────────────────────────────────────
const noiseBuffer = createNoiseBuffer(audioCtx, NOISE_DURATION);

// ── DOM References ──────────────────────────────────────────────
const bpmNumber = document.getElementById("bpmNumber");
const dumNumber = document.getElementById("dumFreqNumber");
const tekNumber = document.getElementById("tekFreqNumber");
const volumeSlider = document.getElementById("volume");

// ── Utility Functions ───────────────────────────────────────────
function clamp(x, min, max) { return Math.max(min, Math.min(max, x)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function secondsPerBeat(localBpm = bpm) { return (60 / localBpm) * (4 / parseInt(notationSpeed)); }
function updateMasterVolume() { master.gain.value = (volume / VOL_MAX) * MAX_MASTER_GAIN; }

// ── Generic UI Helpers ──────────────────────────────────────────
function syncUI(slider, numberInput, displayId, value) {
  slider.value = value;
  numberInput.value = value;
}
function bindSliderSpinbox(slider, numberInput, setter) {
  slider.addEventListener("input", e => setter(e.target.value));
  numberInput.addEventListener("input", e => setter(e.target.value));
  numberInput.addEventListener("change", e => setter(e.target.value));
}

// ── Frequency Order Enforcement ─────────────────────────────────
function enforceFreqOrder() {
  if (dumFreq >= tekFreq) {
    tekFreq = Math.min(FREQ_MAX, dumFreq + 1);
    if (tekFreq <= dumFreq) dumFreq = Math.max(FREQ_MIN, tekFreq - 1);
  }
}

// ── Parameter Setters ───────────────────────────────────────────
function setBpmValue(value) {
  const oldBpm = bpm;
  bpm = clamp(Number(value) || BPM_DEFAULT, BPM_MIN, BPM_MAX);
  bpmNumber.value = bpm;
  const tb = document.getElementById("toggleBpm"); if(tb) tb.textContent = bpm;
  if (isPlaying && oldBpm !== bpm) {
    resyncAfterBpmChange(oldBpm, bpm);
    volPulseNeedsSync = true;
  }
  startBpmPulse();
  document.getElementById("toggle").style.setProperty("--beat-ms", (60000/bpm)+"ms");
}

let bpmPulseTimer = null;
let bpmPulsePaused = false;
function startBpmPulse() {
  if (bpmPulseTimer) clearInterval(bpmPulseTimer);
  if (isPlaying) return; // ring pulse handled by onScheduledEvent
  const icon = document.getElementById("bpmIcon");
  if (!icon) return;
  const ms = 60000 / bpm;
  function pulse() {
    if (bpmPulsePaused) return;
    icon.classList.remove("pulse");
    void icon.offsetWidth;
    icon.classList.add("pulse");
  }
  pulse();
  bpmPulseTimer = setInterval(pulse, ms);
}
function pulseRing() {
  const vc = document.querySelector(".viz-container");
  const spbMs = secondsPerBeat() * 1000;
  // Duration: 60% of beat, clamped between 80ms and 250ms
  const dur = Math.max(80, Math.min(250, spbMs * 0.6));
  // Scale: lerp from 1.04 at ≤100 BPM to 1.015 at ≥200 BPM
  const t = Math.max(0, Math.min(1, (bpm - 100) / 100));
  const scale = 1.04 - t * 0.025;
  vc.style.setProperty("--pulse-dur", dur + "ms");
  vc.style.setProperty("--pulse-scale", scale);
  vc.classList.remove("ring-pulse");
  void vc.offsetWidth;
  vc.classList.add("ring-pulse");
}

// Tap-tempo state
const tapTimes = [];
const TAP_RESET_MS = 2000;

document.addEventListener("DOMContentLoaded", () => {
  const icon = document.getElementById("bpmIcon");
  icon.style.cursor = "pointer";
  icon.addEventListener("mouseleave", () => {
    tapTimes.length = 0;
  });
  icon.addEventListener("click", () => {
    const now = performance.now();
    if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > TAP_RESET_MS) {
      tapTimes.length = 0;
    }
    tapTimes.push(now);
    // Trigger a visual pulse on each tap
    icon.classList.remove("pulse");
    void icon.offsetWidth;
    icon.classList.add("pulse");
    if (tapTimes.length >= 2) {
      const intervals = [];
      for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i - 1]);
      const avgMs = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      const tapBpm = Math.round(60000 / avgMs);
      setBpmValue(tapBpm);
    }
  });
});
function resyncAfterBpmChange(oldBpm, newBpm) {
  const now = audioCtx.currentTime;
  const oldCycleDur = totalUnits * secondsPerBeat(oldBpm);
  const newCycleDur = totalUnits * secondsPerBeat(newBpm);
  // Preserve sweep hand position: compute progress under old tempo, rebase to new
  const elapsed = now - cycleStartTime;
  const progress = Math.max(0, (elapsed % oldCycleDur) / oldCycleDur);
  cycleStartTime = now - progress * newCycleDur;
  // Rebase nextNoteTime: scale remaining time by tempo ratio
  const remaining = nextNoteTime - now;
  if (remaining > 0) {
    nextNoteTime = now + remaining * (oldBpm / newBpm);
  }
}

function resyncAfterSpeedChange(oldSpeed, newSpeed) {
  const now = audioCtx.currentTime;
  const oldFactor = 4 / parseInt(oldSpeed);
  const newFactor = 4 / parseInt(newSpeed);
  const spb = 60 / bpm;
  const oldCycleDur = totalUnits * spb * oldFactor;
  const newCycleDur = totalUnits * spb * newFactor;
  const elapsed = now - cycleStartTime;
  const progress = Math.max(0, (elapsed % oldCycleDur) / oldCycleDur);
  cycleStartTime = now - progress * newCycleDur;
  const remaining = nextNoteTime - now;
  if (remaining > 0) {
    nextNoteTime = now + remaining * (newFactor / oldFactor);
  }
}
let volumeBeforeMute = 100;
function updateVolumeIcon() {
  const el = document.getElementById("volumeIcon");
  if (!el) return;
  if ((dumMuted && tekMuted) || volume === 0) el.textContent = "\u{1F507}";
  else if (volume <= 32) el.textContent = "\u{1F508}";
  else if (volume <= 65) el.textContent = "\u{1F509}";
  else el.textContent = "\u{1F50A}";
  el.style.cursor = "pointer";
}
document.addEventListener("DOMContentLoaded", () => {
  startBpmPulse();
});
function setVolumeValue(value) {
  volume = clamp(Number(value) || 0, VOL_MIN, VOL_MAX);
  volumeSlider.value = volume;
  updateMasterVolume();
  updateVolumeIcon();
}
function setDumValue(value) {
  dumFreq = clamp(Number(value) || FREQ_MIN, FREQ_MIN, FREQ_MAX);
  enforceFreqOrder();
  dumNumber.value = dumFreq;
  tekNumber.value = tekFreq;
}
function setTekValue(value) {
  tekFreq = clamp(Number(value) || FREQ_MIN, FREQ_MIN, FREQ_MAX);
  if (tekFreq <= dumFreq) {
    dumFreq = Math.max(FREQ_MIN, tekFreq - 1);
    if (tekFreq <= dumFreq) tekFreq = Math.min(FREQ_MAX, dumFreq + 1);
  }
  dumNumber.value = dumFreq;
  tekNumber.value = tekFreq;
}

// ── Noise Buffer Creation ───────────────────────────────────────
function createNoiseBuffer(ctx, duration) {
  const length = Math.floor(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
  return buffer;
}

// ── Envelope Calculation ────────────────────────────────────────
function getEnvelope(type, secondsToNextHit, localBpm = bpm) {
  if (type === "dum") {
    return {
      attack:DUM_ENV_ATTACK,hold:DUM_ENV_HOLD,
      bodyDecay:clamp(secondsToNextHit*DUM_ENV_BODY_MUL,DUM_ENV_BODY_MIN,DUM_ENV_BODY_MAX),
      tailRelease:clamp(secondsToNextHit*DUM_ENV_TAIL_MUL,DUM_ENV_TAIL_MIN,DUM_ENV_TAIL_MAX),
      peak:DUM_ENV_PEAK,bodyLevel:DUM_ENV_BODY_LEVEL,floor:ENV_FLOOR
    };
  }
  const p = getTekEnvProfile(localBpm);
  return {
    attack:p.attack,hold:p.hold,
    bodyDecay:clamp(secondsToNextHit*p.bodyDecayMul,p.bodyDecayMin,p.bodyDecayMax),
    tailRelease:clamp(secondsToNextHit*p.tailMul,p.tailMin,p.tailMax),
    peak:p.peak,bodyLevel:p.bodyLevel,floor:ENV_FLOOR
  };
}

// ── Dual Oscillator Voice Factory ───────────────────────────────
function createDualOscVoice(ctx, outputNode, params) {
  const {freqHz,time,env,panValue,osc1Type,osc2Type,
    freqStart1Mul,freqStart2Mul,freqEnd2Mul,
    sweep1Time,sweep2Time,lpFreqMul,lpFreqCap,
    gain2PeakRatio,gain2BodyRatio,accent} = params;
  const osc1=ctx.createOscillator(),osc2=ctx.createOscillator();
  const gain1=ctx.createGain(),gain2=ctx.createGain();
  const toneLP=ctx.createBiquadFilter(),panner=ctx.createStereoPanner();
  panner.pan.value=panValue;
  osc1.type=osc1Type;osc2.type=osc2Type;
  toneLP.type="lowpass";toneLP.frequency.value=Math.min(lpFreqCap,freqHz*lpFreqMul);
  osc1.frequency.setValueAtTime(freqHz*freqStart1Mul,time);
  osc1.frequency.exponentialRampToValueAtTime(freqHz,time+sweep1Time);
  osc2.frequency.setValueAtTime(freqHz*freqStart2Mul,time);
  osc2.frequency.exponentialRampToValueAtTime(freqHz*freqEnd2Mul,time+sweep2Time);
  const envEnd=time+env.attack+env.hold+env.bodyDecay+env.tailRelease;
  gain1.gain.setValueAtTime(env.floor,time);
  gain1.gain.linearRampToValueAtTime(env.peak*accent,time+env.attack);
  gain1.gain.setValueAtTime(env.peak*accent,time+env.attack+env.hold);
  gain1.gain.exponentialRampToValueAtTime(env.bodyLevel*accent,time+env.attack+env.hold+env.bodyDecay);
  gain1.gain.exponentialRampToValueAtTime(env.floor,envEnd);
  gain2.gain.setValueAtTime(env.floor,time);
  gain2.gain.linearRampToValueAtTime(env.peak*gain2PeakRatio*accent,time+env.attack);
  gain2.gain.setValueAtTime(env.peak*gain2PeakRatio*accent,time+env.attack+env.hold);
  gain2.gain.exponentialRampToValueAtTime(env.bodyLevel*gain2BodyRatio*accent,time+env.attack+env.hold+env.bodyDecay);
  gain2.gain.exponentialRampToValueAtTime(env.floor,envEnd);
  osc1.connect(gain1);osc2.connect(gain2);
  gain1.connect(toneLP);gain2.connect(toneLP);
  toneLP.connect(panner);panner.connect(outputNode);
  osc1.start(time);osc2.start(time);
  const stopTime=envEnd+OSC_STOP_PAD;
  osc1.stop(stopTime);osc2.stop(stopTime);
}

// ── Engine ──────────────────────────────────────────────────────
function createEngine(ctx, outputNode, localNoiseBuffer) {
  function addNoiseTransient(type, time, panValue) {
    const noise=ctx.createBufferSource();noise.buffer=localNoiseBuffer;
    const filter=ctx.createBiquadFilter();filter.type="bandpass";filter.Q.value=NOISE_Q;
    const gain=ctx.createGain();
    const panner=ctx.createStereoPanner();panner.pan.value=panValue;
    if(type==="dum"){
      filter.frequency.value=DUM_NOISE_BP_FREQ;
      gain.gain.setValueAtTime(ENV_FLOOR,time);
      gain.gain.linearRampToValueAtTime(DUM_NOISE_PEAK,time+DUM_NOISE_ATTACK);
      gain.gain.exponentialRampToValueAtTime(0.001,time+DUM_NOISE_DECAY_END);
    }else{
      filter.frequency.value=TEK_NOISE_BP_FREQ;
      gain.gain.setValueAtTime(ENV_FLOOR,time);
      gain.gain.linearRampToValueAtTime(TEK_NOISE_PEAK,time+TEK_NOISE_ATTACK);
      gain.gain.exponentialRampToValueAtTime(0.001,time+TEK_NOISE_DECAY_END);
    }
    noise.connect(filter);filter.connect(gain);gain.connect(panner);panner.connect(outputNode);
    noise.start(time);noise.stop(time+NOISE_STOP_PAD);
  }
  function playDum(time,nextSameSideTime,freqHz,localBpm,accent=1){
    const secondsToNextHit=Math.max(DUM_MIN_NEXT_HIT,nextSameSideTime-time);
    const env=getEnvelope("dum",secondsToNextHit,localBpm);
    createDualOscVoice(ctx,outputNode,{
      freqHz,time,env,panValue:PAN_RIGHT,accent,
      osc1Type:DUM_OSC1_TYPE,osc2Type:DUM_OSC2_TYPE,
      freqStart1Mul:DUM_FREQ_START1_MUL,freqStart2Mul:DUM_FREQ_START2_MUL,
      freqEnd2Mul:DUM_FREQ_END2_MUL,
      sweep1Time:DUM_SWEEP1_TIME,sweep2Time:DUM_SWEEP2_TIME,
      lpFreqMul:DUM_LP_FREQ_MUL,lpFreqCap:DUM_LP_FREQ_CAP,
      gain2PeakRatio:DUM_GAIN2_PEAK_RATIO,gain2BodyRatio:DUM_GAIN2_BODY_RATIO
    });
    addNoiseTransient("dum",time,PAN_RIGHT);
  }
  function playWeakHit(time,nextSameSideTime,freqHz,panValue,localBpm,accent=1){
    const secondsToNextHit=Math.max(TEK_MIN_NEXT_HIT,nextSameSideTime-time);
    const env=getEnvelope("tek",secondsToNextHit,localBpm);
    createDualOscVoice(ctx,outputNode,{
      freqHz,time,env,panValue,accent,
      osc1Type:TEK_OSC1_TYPE,osc2Type:TEK_OSC2_TYPE,
      freqStart1Mul:TEK_FREQ_START1_MUL,freqStart2Mul:TEK_FREQ_START2_MUL,
      freqEnd2Mul:TEK_FREQ_END2_MUL,
      sweep1Time:TEK_SWEEP1_TIME,sweep2Time:TEK_SWEEP2_TIME,
      lpFreqMul:TEK_LP_FREQ_MUL,lpFreqCap:TEK_LP_FREQ_CAP,
      gain2PeakRatio:TEK_GAIN2_PEAK_RATIO,gain2BodyRatio:TEK_GAIN2_BODY_RATIO
    });
    addNoiseTransient("tek",time,panValue);
  }
  function playHek(time,rightNextSameSideTime,leftNextSameSideTime,freqHz,localBpm,accent=1){
    playWeakHit(time,rightNextSameSideTime,freqHz*HEK_FREQ_RIGHT_MUL,PAN_RIGHT,localBpm,accent);
    playWeakHit(time+HEK_LEFT_DELAY,leftNextSameSideTime,freqHz*HEK_FREQ_LEFT_MUL,PAN_LEFT,localBpm,accent);
  }
  return {playDum,playWeakHit,playHek};
}

// ── Solo Mode ───────────────────────────────────────────────────
function shouldPlayEventKind(kind, localSoloMode = soloMode) {
  if (localSoloMode === "none") return true;
  if (localSoloMode === "dum") return kind === "dum";
  if (localSoloMode === "tek") return kind !== "dum";
  return true;
}

function updateMuteState() {
  const now = audioCtx.currentTime;
  const fadeSec = 0.015;
  gate.gain.setValueAtTime(gate.gain.value, now);
  if (dumMuted && tekMuted) {
    soloMode = "none";
    gate.gain.linearRampToValueAtTime(0, now + fadeSec);
  } else {
    gate.gain.linearRampToValueAtTime(1, now + fadeSec);
    if (dumMuted) soloMode = "tek";
    else if (tekMuted) soloMode = "dum";
    else soloMode = "none";
  }
  document.getElementById("dumMute").setAttribute("aria-pressed", String(dumMuted));
  document.getElementById("tekMute").setAttribute("aria-pressed", String(tekMuted));
  updateVolumeIcon();
}

// ── Live Engine Instance ────────────────────────────────────────
const liveEngine = createEngine(audioCtx, master, noiseBuffer);

// ── Pattern Helpers ─────────────────────────────────────────────
function D(units=1){return{label:units===1?"düm":`düm${units}`,kind:"dum",units}}
function TL(label="tek",units=1){return{label:units===1?label:`${label}${units}`,kind:"weakLeft",units}}
function TR(label="te",units=1){return{label:units===1?label:`${label}${units}`,kind:"weakRight",units}}
function BOTH(label="hek",units=1){return{label:units===1?label:`${label}${units}`,kind:"bothWeak",units}}

// ── Usül Definitions ────────────────────────────────────────────

function getUsulUnitCount(name) {
  return usulDefs[name].reduce((sum, ev) => sum + ev.units, 0);
}

// ── Notation (OSMD) ─────────────────────────────────────────────
let notationSpeed = "4";
let osmd = null;
let notationReady = false;
let notationEventToNote = [];   // eventIdx → noteColumnIdx
let notationNotePositions = []; // [{x, w, cx}] in SVG viewBox coords
let notationNoteTypes = [];     // noteColumnIdx → note type string
let notationNoteUnits = [];     // noteColumnIdx → event unit count
let lastNotationHlIdx = -1;

function durationToNoteInfo(xmlDur) {
  const m = {1:{t:"32nd",d:false},2:{t:"16th",d:false},3:{t:"16th",d:true},
    4:{t:"eighth",d:false},6:{t:"eighth",d:true},8:{t:"quarter",d:false},
    12:{t:"quarter",d:true},16:{t:"half",d:false},24:{t:"half",d:true},
    32:{t:"whole",d:false},48:{t:"whole",d:true},64:{t:"breve",d:false}};
  return m[xmlDur] || {t:"quarter",d:false};
}

function stemDir(kind) {
  if (kind === "dum" || kind === "weakRight") return "up";
  if (kind === "weakLeft") return "down";
  if (kind === "bothWeak") return "up";
  return "up";
}

function noteXml(dur, info, stem, voice, color) {
  let x = `<note${color ? ` color="${color}"` : ''}>`;
  x += "<unpitched><display-step>E</display-step><display-octave>4</display-octave></unpitched>";
  x += `<duration>${dur}</duration><voice>${voice}</voice><type>${info.t}</type>`;
  if (info.d) x += "<dot/>";
  if (stem && info.t !== "whole" && info.t !== "breve") x += `<stem>${stem}</stem>`;
  x += "</note>";
  return x;
}

function invertHex(hex) {
  const r = 255 - parseInt(hex.slice(1, 3), 16);
  const g = 255 - parseInt(hex.slice(3, 5), 16);
  const b = 255 - parseInt(hex.slice(5, 7), 16);
  return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}

function generateMusicXML(usulName, speed) {
  const events = usulDefs[usulName];
  if (!events) return null;
  const speedNum = parseInt(speed);
  const totalUnits = events.reduce((s, e) => s + e.units, 0);
  const divisions = 8;

  // Detect tahek segments for chord rendering
  const tahekIndices = new Set();
  for (let i = 0; i < events.length - 1; i++) {
    const cb = events[i].label.replace(/[\d.½]+$/, "");
    const nb = events[i+1].label.replace(/[\d.½]+$/, "");
    if (cb === "ta" && nb === "hek" && events[i+1].kind === "bothWeak") {
      tahekIndices.add(i);
      tahekIndices.add(i + 1);
    }
  }

  // Build event-to-color map from segment analysis
  const segments = analyzePattern(events);
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  const eventColor = {};
  for (const seg of segments) {
    let color = getSegColor(seg.type);
    if (isDark) color = invertHex(color);
    for (let j = 0; j < seg.events.length; j++) {
      eventColor[seg.startIdx + j] = color;
    }
  }

  let notes = "";
  const voice2 = [];
  let cumDur = 0;
  const evToNote = [];  // build event-to-note mapping
  const noteTypes = []; // noteCol → note type string
  const noteUnits = []; // noteCol → unit count
  let noteCol = 0;      // current note column index

  for (let i = 0; i < events.length; i++) {
    const ev = events[i];
    const xmlDur = ev.units * 32 / speedNum;
    const info = durationToNoteInfo(xmlDur);
    const col = eventColor[i];

    // ta-hek pair handling
    if (tahekIndices.has(i) && ev.label.replace(/[\d.½]+$/, "") === "ta") {
      // stem-down for ta in ta-hek (stem ignored for whole/breve by noteXml)
      notes += noteXml(xmlDur, info, "down", 1, col);
      cumDur += xmlDur;
      noteTypes.push(info.t); noteUnits.push(ev.units); evToNote[i] = noteCol++;
      continue;
    }

    if (tahekIndices.has(i) && ev.kind === "bothWeak") {
      if (info.t === "whole" || info.t === "breve") {
        // Stemless: sequential note in voice 1 only (no chord overlay)
        notes += noteXml(xmlDur, info, stemDir(ev.kind), 1, col);
        cumDur += xmlDur;
        noteTypes.push(info.t); noteUnits.push(ev.units); evToNote[i] = noteCol++;
        continue;
      }
      // Voice 2 chord overlay for notes with stems
      notes += noteXml(xmlDur, info, stemDir(ev.kind), 1, col);
      voice2.push({ offset: cumDur, dur: xmlDur, info, color: col });
      cumDur += xmlDur;
      noteTypes.push(info.t); noteUnits.push(ev.units); evToNote[i] = noteCol++;
      continue;
    }

    notes += noteXml(xmlDur, info, stemDir(ev.kind), 1, col);
    cumDur += xmlDur;
    noteTypes.push(info.t); noteUnits.push(ev.units); evToNote[i] = noteCol++;
  }
  notationEventToNote = evToNote;
  notationNoteTypes = noteTypes;
  notationNoteUnits = noteUnits;

  // Voice 2: chord overlay at hek positions with forced stems
  if (voice2.length > 0) {
    notes += `<backup><duration>${cumDur}</duration></backup>`;
    let v2pos = 0;
    for (const v of voice2) {
      if (v.offset > v2pos) {
        notes += `<forward><duration>${v.offset - v2pos}</duration></forward>`;
        v2pos = v.offset;
      }
      let x = `<note${v.color ? ` color="${v.color}"` : ''}>`;
      x += "<unpitched><display-step>E</display-step><display-octave>4</display-octave></unpitched>";
      x += `<duration>${v.dur}</duration><voice>2</voice><type>${v.info.t}</type>`;
      if (v.info.d) x += "<dot/>";
      x += "<stem>down</stem></note>";
      notes += x;
      v2pos += v.dur;
    }
    if (v2pos < cumDur) {
      notes += `<forward><duration>${cumDur - v2pos}</duration></forward>`;
    }
  }

  return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 4.0 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">
<score-partwise version="4.0">
<part-list><score-part id="P1"><part-name>U</part-name></score-part></part-list>
<part id="P1"><measure number="1">
<attributes><divisions>${divisions}</divisions>
<time><beats>${totalUnits}</beats><beat-type>${speedNum}</beat-type></time>
<clef><sign>percussion</sign></clef>
<staff-details><staff-lines>1</staff-lines></staff-details>
</attributes>${notes}</measure></part></score-partwise>`;
}

async function updateNotation() {
  if (!osmd || !notationReady) return;
  const xml = generateMusicXML(currentUsulName, notationSpeed);
  if (!xml) return;
  const container = document.getElementById("notationDisplay");
  try {
    // Render in a wide container so OSMD preserves duration-proportional spacing
    container.style.width = "2000px";
    await osmd.load(xml);
    osmd.zoom = 0.7;
    osmd.render();
    // Crop SVG to content with consistent viewBox height
    const svg = container.querySelector("svg");
    if (svg) {
      const bb = svg.getBBox();
      const p = 4;
      const vbW = bb.width + p * 2;
      const minH = 78; // stem-note reference height for consistent scale
      const contentH = bb.height + p * 2;
      const vbH = Math.max(contentH, minH);
      const yCenter = bb.y + bb.height / 2;
      const vbX = bb.x - p;
      const vbY = yCenter - vbH / 2;
      svg.setAttribute("viewBox", `${vbX} ${vbY} ${vbW} ${vbH}`);
      // Adaptive sizing: match beat-info width, cap height responsively
      container.style.width = "";
      const cw = document.querySelector('.beat-info')?.offsetWidth || container.parentElement.offsetWidth;
      const maxH = Math.max(70, Math.min(140, cw * 0.12));
      const ar = vbW / vbH;
      let sw = cw, sh = cw / ar;
      if (sh > maxH) { sh = maxH; sw = sh * ar; }
      svg.setAttribute("width", sw);
      svg.setAttribute("height", sh);
      container.style.minHeight = maxH + "px";

      // Detect note positions for notation highlight (proportional allocation)
      detectNotePositions(svg, vbX, vbY, vbW, vbH);
      // Insert highlight rect behind all content
      const hlRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      hlRect.id = "noteHl";
      hlRect.setAttribute("y", vbY);
      hlRect.setAttribute("height", vbH);
      hlRect.setAttribute("rx", 3);
      hlRect.setAttribute("opacity", "0");
      hlRect.setAttribute("pointer-events", "none");
      svg.insertBefore(hlRect, svg.firstChild);
      lastNotationHlIdx = -1;
    }
  } catch (e) { /* OSMD render error, ignore silently */ }
  fitBeatLabels();
}

function detectNotePositions(svg, vbX, vbY, vbW, vbH) {
  notationNotePositions = [];
  if (!svg) return;
  const expected = notationNoteUnits.length;
  if (expected === 0) return;
  const svgRect = svg.getBoundingClientRect();
  if (svgRect.width === 0) return;
  const scaleX = vbW / svgRect.width;

  // Scan path elements for notehead-like bounding boxes, tracking center and left edge
  const paths = svg.querySelectorAll("path");
  const noteData = [];
  for (const p of paths) {
    try {
      const b = p.getBBox();
      if (b.width >= 5 && b.width <= 30 && b.height >= 3 && b.height <= 20
          && b.width / b.height >= 0.8 && b.width / b.height <= 4.0) {
        const r = p.getBoundingClientRect();
        const cx = vbX + (r.left + r.width / 2 - svgRect.left) * scaleX;
        const left = vbX + (r.left - svgRect.left) * scaleX;
        noteData.push({ cx, left });
      }
    } catch (_) {}
  }
  if (noteData.length === 0) return;
  noteData.sort((a, b) => a.cx - b.cx);

  // Group nearby noteheads into columns (threshold 5 viewBox units)
  const allColumns = [];
  let grp = [noteData[0]];
  for (let i = 1; i < noteData.length; i++) {
    if (noteData[i].cx - noteData[i - 1].cx < 5) {
      grp.push(noteData[i]);
    } else {
      allColumns.push({
        cx: grp.reduce((s, v) => s + v.cx, 0) / grp.length,
        left: Math.min(...grp.map(v => v.left))
      });
      grp = [noteData[i]];
    }
  }
  allColumns.push({
    cx: grp.reduce((s, v) => s + v.cx, 0) / grp.length,
    left: Math.min(...grp.map(v => v.left))
  });

  // Take only the last N columns matching expected note count
  // (earlier columns are time signature digits / other non-note elements)
  if (allColumns.length < expected) return;
  const columns = allColumns.slice(allColumns.length - expected);

  // Find barline: rightmost thin vertical rect in the SVG
  let barlineX = null;
  for (const el of svg.querySelectorAll("rect")) {
    try {
      const b = el.getBBox();
      if (b.width < 3 && b.height > 15) {
        const r = el.getBoundingClientRect();
        const rx = vbX + (r.left + r.width / 2 - svgRect.left) * scaleX;
        if (barlineX === null || rx > barlineX) barlineX = rx;
      }
    } catch (_) {}
  }
  if (barlineX === null) barlineX = vbX + vbW - 4;

  // Contiguous note-to-note allocation anchored to notehead left edges.
  // Each highlight starts at its note's leftmost colored element and ends
  // where the next note's colored element begins.
  // Guarantees: rules 3 (elements inside), 4-5 (contiguous), 7 (left-edge start).
  // Rule 1 (same width) is naturally approximated by OSMD's consistent spacing.
  const barGap = 2;

  for (let i = 0; i < expected; i++) {
    const left = columns[i].left;
    const right = i < expected - 1 ? columns[i + 1].left : barlineX - barGap;
    notationNotePositions.push({ x: left, w: right - left, cx: columns[i].cx });
  }
}

function updateNotationHighlight(activeEventIdx, color) {
  const noteIdx = notationEventToNote[activeEventIdx];
  if (noteIdx === undefined || noteIdx === lastNotationHlIdx) return;
  lastNotationHlIdx = noteIdx;
  const pos = notationNotePositions[noteIdx];
  const svg = document.querySelector("#notationDisplay svg");
  if (!pos || !svg) return;
  const rect = svg.getElementById("noteHl");
  if (!rect) return;
  const isDark = document.body.getAttribute("data-theme") === "dark";
  const fill = isDark ? invertHex(color) : color;
  rect.setAttribute("x", pos.x);
  rect.setAttribute("width", pos.w);
  rect.setAttribute("fill", fill);
  rect.setAttribute("opacity", "0.25");
}

function clearNotationHighlight() {
  lastNotationHlIdx = -1;
  const rect = document.querySelector("#noteHl");
  if (rect) rect.setAttribute("opacity", "0");
}

function initOSMD() {
  if (typeof opensheetmusicdisplay === "undefined") return;
  const container = document.getElementById("notationDisplay");
  if (!container) return;
  osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(container, {
    autoResize: false,
    drawTitle: false,
    drawSubtitle: false,
    drawComposer: false,
    drawCredits: false,
    drawPartNames: false,
    drawPartAbbreviations: false,
    drawMeasureNumbers: false,
    drawTimeSignatures: true,
  });
  notationReady = true;
  // Defer first render so container is fully laid out
  requestAnimationFrame(() => requestAnimationFrame(() => updateNotation()));
  // Re-render on resize for adaptive sizing
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => updateNotation(), 150);
  });
}

// Speed selector
document.getElementById("notationSpeeds")?.addEventListener("click", e => {
  const btn = e.target.closest("button[data-speed]");
  if (!btn) return;
  const oldSpeed = notationSpeed;
  notationSpeed = btn.dataset.speed;
  document.querySelectorAll("#notationSpeeds button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  syncToggleNote();
  updateNotation();
  if (isPlaying && oldSpeed !== notationSpeed) {
    resyncAfterSpeedChange(oldSpeed, notationSpeed);
    volPulseNeedsSync = true;
  }
});

// Init OSMD when library loads (deferred script)
if (typeof opensheetmusicdisplay !== "undefined") initOSMD();
else window.addEventListener("load", initOSMD);

// ── Pattern State ───────────────────────────────────────────────
let currentUsulName = "Nim Sofyan";
let pattern = usulDefs[currentUsulName];

// ── Side Detection ──────────────────────────────────────────────
function eventHasRightSide(event) {
  return event.kind === "dum" || event.kind === "weakRight" || event.kind === "bothWeak";
}
function eventHasLeftSide(event) {
  return event.kind === "weakLeft" || event.kind === "bothWeak";
}
function getNextSameSideTime(stepIndex, currentTime, side, patternDef = pattern, localBpm = bpm) {
  const len = patternDef.length;
  let accumulated = patternDef[stepIndex].units * secondsPerBeat(localBpm);
  for (let offset = 1; offset <= len; offset++) {
    const nextIndex = (stepIndex + offset) % len;
    const nextEvent = patternDef[nextIndex];
    if (side === "right" && eventHasRightSide(nextEvent)) return currentTime + accumulated;
    if (side === "left" && eventHasLeftSide(nextEvent)) return currentTime + accumulated;
    accumulated += nextEvent.units * secondsPerBeat(localBpm);
  }
  return currentTime + accumulated;
}

// ── Event Dispatch ──────────────────────────────────────────────
function dispatchEvent(engine, event, time, rightNext, leftNext, localDumFreq, localTekFreq, localBpm, localSoloMode) {
  if (!shouldPlayEventKind(event.kind, localSoloMode)) return;
  if (event.kind === "dum") engine.playDum(time, rightNext, localDumFreq, localBpm, 1.0);
  else if (event.kind === "weakLeft") engine.playWeakHit(time, leftNext, localTekFreq, PAN_LEFT, localBpm, 1.0);
  else if (event.kind === "weakRight") engine.playWeakHit(time, rightNext, localTekFreq, PAN_RIGHT, localBpm, 1.0);
  else if (event.kind === "bothWeak") engine.playHek(time, rightNext, leftNext, localTekFreq, localBpm, 1.0);
}

// ── Scheduler & Transport ───────────────────────────────────────
let cycleStartTime = 0;

function scheduler() {
  while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_TIME) {
    const stepIndex = currentStep;
    const event = pattern[stepIndex];
    const time = nextNoteTime;
    const rightNext = getNextSameSideTime(stepIndex, time, "right");
    const leftNext = getNextSameSideTime(stepIndex, time, "left");
    dispatchEvent(liveEngine, event, time, rightNext, leftNext, dumFreq, tekFreq, bpm, soloMode);
    // Faz 0: UI hook
    if (onScheduledEvent) onScheduledEvent(stepIndex, time, event, rightNext, leftNext);
    nextNoteTime = time + (event.units * secondsPerBeat());
    currentStep = (currentStep + 1) % pattern.length;
    if (currentStep === 0) { }
  }
}

let _countInTimer1 = null, _countInTimer2 = null;
function cancelCountIn() {
  clearTimeout(_countInTimer1); clearTimeout(_countInTimer2);
  _countInTimer1 = _countInTimer2 = null;
}

function beginTransportAfterCountIn() {
  currentStep = 0;
  nextNoteTime = audioCtx.currentTime + TRANSPORT_START_DELAY;
  cycleStartTime = nextNoteTime;
  timerId = setInterval(scheduler, LOOKAHEAD_MS);
  startSweepAnimation();
  startVolPulse();
}

async function startTransport() {
  if (audioCtx.state === "suspended") await audioCtx.resume();
  cancelCountIn();
  isPlaying = true;
  document.body.dataset.playing = "true";
  const tb = document.getElementById("toggle");
  tb.textContent = "DUR";
  // Instantly snap button color to first beat
  tb.style.setProperty("--btn-trans", "0ms");
  tb.style.setProperty("--btn-mix", pattern[0].kind === "dum" ? "0" : "1");
  startBpmPulse();
  const spbMs = secondsPerBeat() * 1000;
  // Count-in: 2 preparatory ring pulses, playback starts on the 3rd
  pulseRing();
  _countInTimer1 = setTimeout(() => pulseRing(), spbMs);
  _countInTimer2 = setTimeout(() => {
    pulseRing();
    beginTransportAfterCountIn();
    fitBeatLabels();
  }, spbMs * 2);
}

function stopTransport() {
  cancelCountIn();
  clearInterval(timerId);
  timerId = null;
  isPlaying = false;
  document.body.dataset.playing = "false";
  const tb2 = document.getElementById("toggle");
  tb2.textContent = "VUR";
  tb2.style.removeProperty("--btn-mix");
  tb2.style.removeProperty("--btn-trans");
  tb2.style.removeProperty("--btn-delay");
  stopSweepAnimation();
  stopVolPulse();
  fitBeatLabels();
  startBpmPulse();
  document.querySelector(".viz-container").classList.remove("ring-pulse");
}

let _restartTimer = null;
function restartTransportIfPlaying() {
  if (!isPlaying) return;
  const fadeSec = 0.015;
  // Cancel any pending restart
  if (_restartTimer) { clearTimeout(_restartTimer); _restartTimer = null; }
  cancelCountIn();
  // Fade out current audio
  gate.gain.cancelScheduledValues(audioCtx.currentTime);
  gate.gain.setValueAtTime(gate.gain.value, audioCtx.currentTime);
  gate.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeSec);
  _restartTimer = setTimeout(() => {
    _restartTimer = null;
    // Stop scheduler but keep isPlaying true
    clearInterval(timerId); timerId = null;
    stopSweepAnimation();
    document.querySelector(".viz-container").classList.remove("ring-pulse");
    // Apply fitted/shrink layout during count-in (bypass marquee since isPlaying is true)
    isPlaying = false;
    fitBeatLabels();
    isPlaying = true;
    // Count-in: 2 preparatory pulses, then restart on 3rd
    const spbMs = secondsPerBeat() * 1000;
    pulseRing();
    _countInTimer1 = setTimeout(() => pulseRing(), spbMs);
    _countInTimer2 = setTimeout(() => {
      pulseRing();
      beginTransportAfterCountIn();
      startSweepAnimation();
      fitBeatLabels();
      const t = audioCtx.currentTime;
      gate.gain.cancelScheduledValues(t);
      if (!(dumMuted && tekMuted)) {
        gate.gain.setValueAtTime(0, t);
        gate.gain.linearRampToValueAtTime(1, t + fadeSec);
      }
    }, spbMs * 2);
  }, 20);
}

// ── WAV Encoding ────────────────────────────────────────────────
function interleaveStereo(left, right) {
  const length = left.length + right.length;
  const result = new Float32Array(length);
  let index = 0, inputIndex = 0;
  while (index < length) { result[index++] = left[inputIndex]; result[index++] = right[inputIndex]; inputIndex++; }
  return result;
}

function encodeWavFromAudioBuffer(audioBuffer) {
  const numChannels = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const bitDepth = 16;
  const channelData = [];
  for (let i = 0; i < numChannels; i++) channelData.push(audioBuffer.getChannelData(i));
  const interleaved = numChannels === 2 ? interleaveStereo(channelData[0], channelData[1]) : channelData[0];
  const blockAlign = numChannels * bitDepth / 8;
  const byteRate = sampleRate * blockAlign;
  const dataSize = interleaved.length * 2;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);
  function ws(o, s) { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); }
  let o = 0;
  ws(o,"RIFF");o+=4;view.setUint32(o,36+dataSize,true);o+=4;ws(o,"WAVE");o+=4;
  ws(o,"fmt ");o+=4;view.setUint32(o,16,true);o+=4;view.setUint16(o,1,true);o+=2;
  view.setUint16(o,numChannels,true);o+=2;view.setUint32(o,sampleRate,true);o+=4;
  view.setUint32(o,byteRate,true);o+=4;view.setUint16(o,blockAlign,true);o+=2;
  view.setUint16(o,bitDepth,true);o+=2;ws(o,"data");o+=4;view.setUint32(o,dataSize,true);o+=4;
  let idx=44;
  for(let i=0;i<interleaved.length;i++){
    const sample=Math.max(-1,Math.min(1,interleaved[i]));
    view.setInt16(idx,sample<0?sample*0x8000:sample*0x7FFF,true);idx+=2;
  }
  return new Blob([buffer],{type:"audio/wav"});
}

async function renderSelectedPatternToWav() {
  const repeatInput=document.getElementById("repeatCount");
  const renderStatus=document.getElementById("renderStatus");
  const renderBtn=document.getElementById("renderWavBtn");
  const repeatCount=clamp(Number(repeatInput.value)||1,REPEAT_MIN,REPEAT_MAX);
  repeatInput.value=repeatCount;
  const localBpm=bpm,localDumFreq=dumFreq,localTekFreq=tekFreq,localVolume=volume;
  const localPattern=pattern,localUsulName=currentUsulName,localSoloMode=soloMode;
  const compact=document.body.dataset.compact==="true";
  renderBtn.disabled=true;if(!compact)renderStatus.textContent="Oluşturuluyor…";
  try{
    const spb=secondsPerBeat(localBpm);
    const patternCycleDuration=localPattern.reduce((sum,ev)=>sum+ev.units*spb,0);
    const totalDuration=(repeatCount*patternCycleDuration)+RENDER_TAIL_SECONDS;
    const offlineCtx=new OfflineAudioContext(2,Math.ceil(totalDuration*RENDER_SAMPLE_RATE),RENDER_SAMPLE_RATE);
    const offlineMaster=offlineCtx.createGain();offlineMaster.gain.value=(localVolume/VOL_MAX)*MAX_MASTER_GAIN;
    const offlineHP=offlineCtx.createBiquadFilter();offlineHP.type="highpass";offlineHP.frequency.value=HP_FREQ;
    offlineMaster.connect(offlineHP);offlineHP.connect(offlineCtx.destination);
    const offlineEngine=createEngine(offlineCtx,offlineMaster,noiseBuffer);
    for(let r=0;r<repeatCount;r++){
      const cycleOffset=r*patternCycleDuration;let stepOffset=0;
      for(let i=0;i<localPattern.length;i++){
        const event=localPattern[i];const time=cycleOffset+stepOffset;
        const rightNext=getNextSameSideTime(i,time,"right",localPattern,localBpm);
        const leftNext=getNextSameSideTime(i,time,"left",localPattern,localBpm);
        dispatchEvent(offlineEngine,event,time,rightNext,leftNext,localDumFreq,localTekFreq,localBpm,localSoloMode);
        stepOffset+=event.units*spb;
      }
    }
    const renderedBuffer=await offlineCtx.startRendering();
    const wavBlob=encodeWavFromAudioBuffer(renderedBuffer);
    const safeUsulName=localUsulName.replace(/[^\p{L}\p{N}\s-]/gu,"").replace(/\s+/g,"_");
    const soloSuffix=localSoloMode==="dum"?"_dumSolo":localSoloMode==="tek"?"_tekSolo":"";
    const fileName=`${safeUsulName}_${localBpm}BPM_dum${localDumFreq}Hz_tek${localTekFreq}Hz_x${repeatCount}${soloSuffix}.wav`;
    const url=URL.createObjectURL(wavBlob);
    const a=document.createElement("a");a.href=url;a.download=fileName;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    if(compact){
      renderStatus.classList.remove("marquee");renderStatus.innerHTML=`<span>${fileName} oluşturuldu.</span>`;renderStatus.offsetWidth;renderStatus.classList.add("marquee");
      renderStatus.querySelector("span").addEventListener("animationend",()=>{renderStatus.innerHTML="";renderStatus.classList.remove("marquee");},{once:true});
    }else{
      renderStatus.textContent=`${fileName} oluşturuldu.`;
      renderStatus.classList.remove("fading");renderStatus.offsetWidth;renderStatus.classList.add("fading");
      setTimeout(()=>{renderStatus.textContent="";renderStatus.classList.remove("fading");},10000);
    }
  }catch(error){console.error(error);
    if(compact){
      renderStatus.classList.remove("marquee");renderStatus.innerHTML=`<span>Kaydetme başarısız.</span>`;renderStatus.offsetWidth;renderStatus.classList.add("marquee");
      renderStatus.querySelector("span").addEventListener("animationend",()=>{renderStatus.innerHTML="";renderStatus.classList.remove("marquee");},{once:true});
    }else{
      renderStatus.textContent="Kaydetme başarısız.";
      renderStatus.classList.remove("fading");renderStatus.offsetWidth;renderStatus.classList.add("fading");
      setTimeout(()=>{renderStatus.textContent="";renderStatus.classList.remove("fading");},10000);
    }
  }
  finally{renderBtn.disabled=false;}
}

// ══════════════════════════════════════════════════════════════════
// UI / VISUALIZATION LAYER
