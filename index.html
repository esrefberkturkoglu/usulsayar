// ── Color mapping for segment types ─────────────────────────────
const SEGMENT_COLORS = {dum:"--dum",tek:"--tek",teke:"--teke",teka:"--teka",tekka:"--tekka",tahek:"--tahek"};

function getSegColor(type) {
  return getComputedStyle(document.body).getPropertyValue(SEGMENT_COLORS[type] || "--tek").trim();
}

// ── Compound Beat Detection ─────────────────────────────────────
function baseLabel(lbl) { return lbl.replace(/[\d.½]+$/, ""); }

function analyzePattern(events) {
  const segments = [];
  let i = 0;
  while (i < events.length) {
    const curr = events[i];
    const cb = baseLabel(curr.label);
    const next = events[i + 1];
    const nb = next ? baseLabel(next.label) : null;

    if (cb === "te" && nb === "ke" && curr.kind === "weakRight" && next.kind === "weakLeft") {
      segments.push({ type:"teke", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (cb === "te" && nb === "kâ" && curr.kind === "weakRight" && next.kind === "weakLeft") {
      segments.push({ type:"teka", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (cb === "tek" && nb === "kâ" && curr.kind === "weakRight" && next.kind === "weakLeft") {
      segments.push({ type:"tekka", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (cb === "ta" && nb === "hek" && next && next.kind === "bothWeak") {
      segments.push({ type:"tahek", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (curr.kind === "dum") {
      segments.push({ type:"dum", units:curr.units, events:[curr], startIdx:i });
      i++;
    } else {
      segments.push({ type:"tek", units:curr.units, events:[curr], startIdx:i });
      i++;
    }
  }
  return segments;
}

// Build a lookup: eventIndex → segmentIndex
let eventToSegment = [];
let visualSegments = [];
let totalUnits = 0;

function rebuildSegments() {
  visualSegments = analyzePattern(pattern);
  totalUnits = visualSegments.reduce((s, seg) => s + seg.units, 0);
  eventToSegment = [];
  visualSegments.forEach((seg, si) => {
    seg.events.forEach((_, ei) => {
      eventToSegment[seg.startIdx + ei] = si;
    });
  });
}

// ── SVG Pie Chart ───────────────────────────────────────────────
function polarToCart(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function renderSegmentRing() {
  const svg = document.getElementById("segmentRing");
  svg.innerHTML = "";
  const cx = 100, cy = 100, r = 95;
  const GAP = 0.8;
  const degPerUnit = 360 / totalUnits;
  let startAngle = 0;

  visualSegments.forEach((seg, i) => {
    const sweep = seg.units * degPerUnit - GAP;
    const endAngle = startAngle + sweep;
    const largeArc = sweep > 180 ? 1 : 0;
    const p1 = polarToCart(cx, cy, r, startAngle);
    const p2 = polarToCart(cx, cy, r, endAngle);

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d",
      `M${cx},${cy} L${p1.x.toFixed(2)},${p1.y.toFixed(2)} A${r},${r},0,${largeArc},1,${p2.x.toFixed(2)},${p2.y.toFixed(2)} Z`
    );
    path.setAttribute("fill", getSegColor(seg.type));
    path.setAttribute("data-seg", i);
    path.classList.add("seg-path");
    svg.appendChild(path);

    startAngle += seg.units * degPerUnit;
  });
}

// ── Segment Click Sound ────────────────────────────────────────
function activateBeatLabel(eventIdx, durationMs) {
  clearKaraokeHighlight();
  const span = beatLabelSpans[eventIdx];
  if (!span) return;
  const segIdx = eventToSegment[eventIdx];
  const color = segIdx !== undefined ? getSegColor(visualSegments[segIdx].type) : getSegColor("tek");
  span.style.setProperty("--active-bg", color);
  span.classList.add("active");
  lastActiveEventIdx = eventIdx;
  setTimeout(() => {
    span.classList.remove("active");
    span.style.removeProperty("--active-bg");
    if (lastActiveEventIdx === eventIdx) lastActiveEventIdx = -1;
  }, durationMs);
}

function clickHandBar(event, segUnits) {
  const vol = volume / VOL_MAX;
  if (vol < 0.05) return;
  const color = getSegColor(event.kind === "dum" ? "dum" : "tek");
  const retractMs = Math.max(80, segUnits * secondsPerBeat() * 0.5 * 1000);
  if (eventHasRightSide(event)) {
    rightBar.style.background = color;
    rightBar.style.transition = "transform 0.06s ease-out";
    rightBar.style.transform = `scaleY(${vol})`;
    setTimeout(() => { rightBar.style.transition = `transform ${retractMs}ms linear`; rightBar.style.transform = "scaleY(0)"; }, 60);
  }
  if (eventHasLeftSide(event)) {
    leftBar.style.background = color;
    leftBar.style.transition = "transform 0.06s ease-out";
    leftBar.style.transform = `scaleY(${vol})`;
    setTimeout(() => { leftBar.style.transition = `transform ${retractMs}ms linear`; leftBar.style.transform = "scaleY(0)"; }, 60);
  }
}

let segClickLocked = false;
document.getElementById("segmentRing").addEventListener("click", e => {
  if (isPlaying || segClickLocked) return;
  const path = e.target.closest(".seg-path");
  if (!path) return;
  const segIdx = Number(path.dataset.seg);
  const seg = visualSegments[segIdx];
  if (!seg) return;
  if (audioCtx.state === "suspended") audioCtx.resume();
  const now = audioCtx.currentTime + 0.02;
  const spb = secondsPerBeat();
  const farFuture = now + seg.units * spb + 2;
  const evIdx0 = seg.startIdx;
  const totalMs = seg.units * spb * 1000;

  const ring = document.getElementById("segmentRing");
  segClickLocked = true;
  ring.classList.add("seg-locked");
  bpmPulsePaused = true;
  for (let u = 0; u < Math.floor(seg.units); u++) {
    setTimeout(pulseRing, u * spb * 1000);
  }
  setTimeout(() => { segClickLocked = false; ring.classList.remove("seg-locked"); bpmPulsePaused = false; }, totalMs);

  function clickPlayEvent(ev, time, nextTime) {
    if (ev.kind === "dum") liveEngine.playDum(time, nextTime, dumFreq, bpm, 1.0);
    else if (ev.kind === "weakLeft") liveEngine.playWeakHit(time, nextTime, tekFreq, PAN_LEFT, bpm, 1.0);
    else if (ev.kind === "weakRight") liveEngine.playWeakHit(time, nextTime, tekFreq, PAN_RIGHT, bpm, 1.0);
    else if (ev.kind === "bothWeak") liveEngine.playHek(time, nextTime, nextTime, tekFreq, bpm, 1.0);
  }

  if (seg.events.length === 1) {
    clickPlayEvent(seg.events[0], now, farFuture);
    pulseSegment(segIdx);
    clickHandBar(seg.events[0], seg.units);
    activateBeatLabel(evIdx0, totalMs);
  } else {
    const gap = seg.events[0].units * spb;
    const gapMs = gap * 1000;
    clickPlayEvent(seg.events[0], now, now + gap);
    clickPlayEvent(seg.events[1], now + gap, farFuture);
    pulseSegment(segIdx);
    clickHandBar(seg.events[0], seg.events[0].units);
    activateBeatLabel(evIdx0, gapMs);
    setTimeout(() => {
      pulseSegment(segIdx);
      clickHandBar(seg.events[1], seg.events[1].units);
      activateBeatLabel(evIdx0 + 1, seg.events[1].units * spb * 1000);
    }, gapMs);
  }
});

// ── Canvas Sweep Hand ───────────────────────────────────────────
let sweepRafId = null;
const sweepCanvas = document.getElementById("sweepCanvas");
const sweepCtx = sweepCanvas.getContext("2d");

function resizeSweepCanvas() {
  const container = sweepCanvas.parentElement;
  const w = container.clientWidth;
  sweepCanvas.width = w * devicePixelRatio;
  sweepCanvas.height = w * devicePixelRatio;
  sweepCanvas.style.width = w + "px";
  sweepCanvas.style.height = w + "px";
}

let tipPulse = 0;
let tipPulseTime = 0;
const TIP_PULSE_DECAY = 5; // per second

function triggerTipPulse() {
  tipPulse = 1;
  tipPulseTime = performance.now();
}

function drawHand(cx, cy, ex, ey, r, vol) {
  const dpr = devicePixelRatio;
  const sweepColor = getComputedStyle(document.body).getPropertyValue("--sweep").trim();
  const glowColor = getComputedStyle(document.body).getPropertyValue("--sweep-glow").trim();

  // Tapered gradient line
  const grad = sweepCtx.createLinearGradient(cx, cy, ex, ey);
  grad.addColorStop(0, "transparent");
  grad.addColorStop(0.15, sweepColor);
  grad.addColorStop(1, sweepColor);

  // Soft glow layer
  if (vol > 0.1) {
    sweepCtx.save();
    sweepCtx.shadowColor = glowColor;
    sweepCtx.shadowBlur = (8 + vol * 12) * dpr;
    sweepCtx.strokeStyle = glowColor;
    sweepCtx.lineWidth = (3 + vol * 4) * dpr;
    sweepCtx.lineCap = "round";
    sweepCtx.beginPath();
    sweepCtx.moveTo(cx, cy);
    sweepCtx.lineTo(ex, ey);
    sweepCtx.stroke();
    sweepCtx.restore();
  }

  // Main hand with gradient
  sweepCtx.strokeStyle = grad;
  sweepCtx.lineWidth = (1.5 + vol * 1.5) * dpr;
  sweepCtx.lineCap = "round";
  sweepCtx.beginPath();
  sweepCtx.moveTo(cx, cy);
  sweepCtx.lineTo(ex, ey);
  sweepCtx.stroke();

  // Tip pulse decay
  const dtSec = (performance.now() - tipPulseTime) / 1000;
  tipPulse = Math.max(0, 1 - dtSec * TIP_PULSE_DECAY);
  const p = tipPulse * vol;

  // Tip dot: base radius 3.5, pulse expands to +4
  const baseR = 3.5 * dpr;
  const tipR = baseR + p * 4 * dpr;
  const tipGlow = (8 + vol * 10 + p * 20) * dpr;

  sweepCtx.save();
  sweepCtx.shadowColor = sweepColor;
  sweepCtx.shadowBlur = tipGlow;
  sweepCtx.fillStyle = sweepColor;
  sweepCtx.beginPath();
  sweepCtx.arc(ex, ey, tipR, 0, Math.PI * 2);
  sweepCtx.fill();
  sweepCtx.restore();
}

function drawSweep() {
  if (!isPlaying) return;
  const w = sweepCanvas.width, h = sweepCanvas.height;
  const cx = w / 2, cy = h / 2, r = w * 0.475;
  sweepCtx.clearRect(0, 0, w, h);

  const cycleDuration = totalUnits * secondsPerBeat();
  const elapsed = audioCtx.currentTime - cycleStartTime;
  let progress = (elapsed % cycleDuration) / cycleDuration;
  if (progress < 0) progress = 0;

  // Reset cycle start when wrapping
  if (elapsed > cycleDuration) {
    const fullCycles = Math.floor(elapsed / cycleDuration);
    cycleStartTime += fullCycles * cycleDuration;
  }

  const vol = volume / VOL_MAX;

  if (diskMode) {
    const svgEl = document.getElementById("segmentRing");
    svgEl.style.transform = `rotate(${-progress * 360}deg)`;
    drawHand(cx, cy, cx, cy - r, r, vol);
  } else {
    const angle = progress * 2 * Math.PI - Math.PI / 2;
    const ex = cx + r * Math.cos(angle);
    const ey = cy + r * Math.sin(angle);
    drawHand(cx, cy, ex, ey, r, vol);
  }


  // Update active beat label (karaoke)
  updateKaraokeHighlight(progress);

  sweepRafId = requestAnimationFrame(drawSweep);
}

function startSweepAnimation() {
  resizeSweepCanvas();
  if (sweepRafId) cancelAnimationFrame(sweepRafId);
  sweepRafId = requestAnimationFrame(drawSweep);
}

function stopSweepAnimation() {
  if (sweepRafId) { cancelAnimationFrame(sweepRafId); sweepRafId = null; }
  sweepCtx.clearRect(0, 0, sweepCanvas.width, sweepCanvas.height);
  clearKaraokeHighlight();
  // Reset hand guidance bars
  leftBar.style.transform = "scaleY(0)";
  rightBar.style.transform = "scaleY(0)";
  // Reset disk rotation
  document.getElementById("segmentRing").style.transform = "";
}

// ── Segment Pulse ───────────────────────────────────────────────
const SEG_FLASH_KEYFRAMES = [
  { filter: 'brightness(1.6) saturate(1.4)', transform: 'scale(1.03)', offset: 0 },
  { filter: 'brightness(1.25) saturate(1.15)', transform: 'scale(1.01)', offset: 0.4 },
  { filter: 'brightness(1) saturate(1)', transform: 'scale(1)', offset: 1 }
];
function pulseSegment(segIndex) {
  const vol = volume / VOL_MAX;
  if (vol < 0.05) return;
  triggerTipPulse();
  const path = document.querySelector(`.seg-path[data-seg="${segIndex}"]`);
  if (!path) return;
  const spbMs = secondsPerBeat() * 1000;
  const dur = Math.max(100, Math.min(350, spbMs * 0.35));
  path.getAnimations().forEach(a => a.cancel());
  path.animate(SEG_FLASH_KEYFRAMES, { duration: dur, easing: 'ease-out' });
}

// ── Hand Guidance Bars ──────────────────────────────────────────
const leftBar = document.getElementById("leftBar");
const rightBar = document.getElementById("rightBar");

// Son sağ/sol segment birimlerini hatırla (retract hesabı için)
let lastRightSegUnits = 1;
let lastLeftSegUnits = 1;

function triggerHandBar(event, audioTime, rightNextTime, leftNextTime, segUnits) {
  const vol = volume / VOL_MAX;
  if (vol < 0.05) return;
  const delay = Math.max(0, (audioTime - audioCtx.currentTime) * 1000);
  const color = getSegColor(event.kind === "dum" ? "dum" : "tek");
  const spb = secondsPerBeat();

  if (eventHasRightSide(event)) {
    // Sonraki sağ vuruş aynı tarafta mı, karşıt tarafta mı?
    const sameNext = rightNextTime <= leftNextTime;
    const retractUnits = sameNext ? segUnits : lastLeftSegUnits;
    const retractMs = Math.max(80, retractUnits * spb * 0.5 * 1000);
    lastRightSegUnits = segUnits;
    setTimeout(() => {
      rightBar.style.background = color;
      rightBar.style.transition = "transform 0.06s ease-out";
      rightBar.style.transform = `scaleY(${vol})`;
      setTimeout(() => {
        rightBar.style.transition = `transform ${retractMs}ms linear`;
        rightBar.style.transform = "scaleY(0)";
      }, 60);
    }, delay);
  }

  if (eventHasLeftSide(event)) {
    const sameNext = leftNextTime <= rightNextTime;
    const retractUnits = sameNext ? segUnits : lastRightSegUnits;
    const retractMs = Math.max(80, retractUnits * spb * 0.5 * 1000);
    lastLeftSegUnits = segUnits;
    setTimeout(() => {
      leftBar.style.background = color;
      leftBar.style.transition = "transform 0.06s ease-out";
      leftBar.style.transform = `scaleY(${vol})`;
      setTimeout(() => {
        leftBar.style.transition = `transform ${retractMs}ms linear`;
        leftBar.style.transform = "scaleY(0)";
      }, 60);
    }, delay);
  }
}

// ── Beat Labels ─────────────────────────────────────────────────
let beatLabelSpans = [];

function formatLabelDisplay(lbl) {
  return lbl.replace(/0\.5/g, "½");
}

function getSepAfter(label, nextLabel) {
  const base = label.replace(/[0-9½.]/g, "");
  if (base === "te" || base === "ta") return "-";
  if (base === "tek" && nextLabel && nextLabel.replace(/[0-9½.]/g, "") === "kâ") return "-";
  return " · ";
}

function buildBeatLabels() {
  const container = document.getElementById("beatLabels");
  container.innerHTML = "";
  beatLabelSpans = [];

  let dashGroup = null;
  pattern.forEach((ev, i) => {
    const prevSep = i > 0 ? getSepAfter(pattern[i - 1].label, ev.label) : null;
    const isDash = prevSep && prevSep.trim() === "-";

    if (i > 0 && !isDash && dashGroup) {
      container.appendChild(dashGroup);
      dashGroup = null;
    }

    if (i > 0) {
      const sep = document.createElement("span");
      sep.className = isDash ? "sep sep-dash" : "sep";
      sep.textContent = prevSep;
      if (isDash) {
        if (!dashGroup) {
          dashGroup = document.createElement("span");
          dashGroup.style.whiteSpace = "nowrap";
          const prev = container.lastElementChild;
          if (prev) { container.removeChild(prev); dashGroup.appendChild(prev); }
        }
        dashGroup.appendChild(sep);
      } else {
        container.appendChild(sep);
      }
    }

    const span = document.createElement("span");
    span.textContent = formatLabelDisplay(ev.label);
    span.dataset.eventIdx = i;
    const segIdx = eventToSegment[i];
    if (segIdx !== undefined) {
      span.style.color = getSegColor(visualSegments[segIdx].type);
    }
    if (dashGroup) {
      dashGroup.appendChild(span);
    } else {
      container.appendChild(span);
    }
    beatLabelSpans.push(span);
  });
  if (dashGroup) container.appendChild(dashGroup);

  fitBeatLabels();

}

function fitBeatLabels() {
  const container = document.getElementById("beatLabels");
  const parent = container.parentElement;
  const maxWidth = parent.clientWidth;

  // Reset all states
  container.classList.remove("marquee", "fitted");
  container.style.transform = "";
  container.style.transition = "";
  container.style.fontSize = "";

  // Disk mode + playing: always marquee
  if (diskMode && isPlaying) {
    container.classList.add("marquee");
    return;
  }

  // Fits in one line at default font → done
  if (container.scrollWidth <= maxWidth) return;

  // Try font shrink + wrap (max 2 lines)
  container.classList.add("fitted");
  for (let fs = 15; fs >= 9; fs -= 0.5) {
    container.style.fontSize = fs + "px";
    const maxH = fs * 1.3 * 2.5; // line-height:1.3, 2 lines + span padding tolerance
    if (container.scrollHeight <= maxH && container.scrollWidth <= maxWidth) break;
  }
}

function scrollMarqueeToSpan(span, durationSec) {
  const container = document.getElementById("beatLabels");
  if (!container.classList.contains("marquee") || !span) return;
  const parentRect = container.parentElement.getBoundingClientRect();
  const spanRect = span.getBoundingClientRect();
  const parentCenter = parentRect.left + parentRect.width / 2;
  const spanCenter = spanRect.left + spanRect.width / 2;
  const currentTx = parseFloat(container.style.transform.replace(/[^-\d.]/g, '')) || 0;
  const dur = Math.max(0.08, Math.min(0.6, durationSec * 0.4));
  container.style.transition = "transform " + dur.toFixed(3) + "s ease-out";
  container.style.transform = "translateX(" + (currentTx + parentCenter - spanCenter) + "px)";
}

// ── Karaoke Highlight ───────────────────────────────────────────
let lastActiveEventIdx = -1;

function updateKaraokeHighlight(progress) {
  // Find which event is active based on progress
  let accumulated = 0;
  let activeIdx = 0;
  for (let i = 0; i < pattern.length; i++) {
    const evPortion = pattern[i].units / totalUnits;
    if (accumulated + evPortion > progress + 0.001) {
      activeIdx = i;
      break;
    }
    accumulated += evPortion;
    if (i === pattern.length - 1) activeIdx = i;
  }

  if (activeIdx !== lastActiveEventIdx) {
    if (lastActiveEventIdx >= 0 && beatLabelSpans[lastActiveEventIdx]) {
      beatLabelSpans[lastActiveEventIdx].classList.remove("active");
      beatLabelSpans[lastActiveEventIdx].style.removeProperty("--active-bg");
    }
    if (beatLabelSpans[activeIdx]) {
      const segIdx = eventToSegment[activeIdx];
      const color = segIdx !== undefined ? getSegColor(visualSegments[segIdx].type) : getSegColor("tek");
      beatLabelSpans[activeIdx].style.setProperty("--active-bg", color);
      beatLabelSpans[activeIdx].classList.add("active");
      const eventSec = pattern[activeIdx].units * (60 / bpm);
      scrollMarqueeToSpan(beatLabelSpans[activeIdx], eventSec);
    }
    lastActiveEventIdx = activeIdx;
  }
}

function clearKaraokeHighlight() {
  beatLabelSpans.forEach(sp => { sp.classList.remove("active"); sp.style.removeProperty("--active-bg"); });
  lastActiveEventIdx = -1;
  const container = document.getElementById("beatLabels");
  if (container) { container.style.transition = ""; container.style.transform = ""; }
}

// ── onScheduledEvent callback ───────────────────────────────────
let volPulseHalfAcc = 0;
onScheduledEvent = function(stepIndex, audioTime, event, rightNext, leftNext) {
  const delayMs = Math.max(0, (audioTime - audioCtx.currentTime) * 1000);
  const spbMs = secondsPerBeat() * 1000;
  const segIdx = eventToSegment[stepIndex];
  if (segIdx !== undefined) setTimeout(() => pulseSegment(segIdx), delayMs);
  // Ring pulse: once at event start + extra at each unit boundary within multi-unit events
  setTimeout(pulseRing, delayMs);
  for (let u = 1; u < event.units; u++) {
    setTimeout(pulseRing, delayMs + u * spbMs);
  }
  const segUnits = segIdx !== undefined ? visualSegments[segIdx].units : event.units;
  triggerHandBar(event, audioTime, rightNext, leftNext, segUnits);
  // Mute button pulses (once per event)
  if (volume > 0) {
    setTimeout(() => {
      if (event.kind === "dum" && !dumMuted) {
        const db = document.getElementById("dumMute");
        db.classList.remove("pulse"); void db.offsetWidth; db.classList.add("pulse");
      }
      if (event.kind !== "dum" && !tekMuted) {
        const tb = document.getElementById("tekMute");
        tb.classList.remove("pulse"); void tb.offsetWidth; tb.classList.add("pulse");
      }
    }, delayMs);
    // Volume icon pulse — 2× per unit (≤166 BPM), 1× per unit (>166 BPM)
    const vi = document.getElementById("volumeIcon");
    const pulsesPerUnit = bpm > 166 ? 1 : 2;
    const stepMs = spbMs / pulsesPerUnit;
    const prevAcc = volPulseHalfAcc;
    volPulseHalfAcc += event.units * pulsesPerUnit;
    const fp = Math.ceil(prevAcc);
    const lp = Math.ceil(volPulseHalfAcc) - 1;
    for (let p = fp; p <= lp; p++) {
      const off = p - prevAcc;
      setTimeout(() => {
        vi.classList.remove("pulse"); void vi.offsetWidth; vi.classList.add("pulse");
      }, delayMs + off * stepMs);
    }
  }
};

// ── Carousel ────────────────────────────────────────────────────
const carouselTrack = document.getElementById("carouselTrack");
let carouselCards = [];
let selectedCardIndex = 0;
const usulNames = Object.keys(usulDefs);

function buildCarousel() {
  carouselTrack.innerHTML = "";
  // Padding for centering first/last cards
  const padL = document.createElement("div");
  padL.style.cssText = "flex:0 0 calc(50% - 63px)";
  carouselTrack.appendChild(padL);

  usulNames.forEach((name, i) => {
    const card = document.createElement("div");
    card.className = "carousel-card" + (name === currentUsulName ? " active" : "");
    card.dataset.usul = name;
    card.dataset.idx = i;
    const displayName = name.replace(/^(Şarkı|Bektaşi|Ayin)\s(?=Devr-i)/, "$1\n").replace(/^(Bektaşi)\s(Raksanı)$/, "$1\n$2");
    const nameSpan = `<span class="c-name">${displayName}</span>`;
    card.innerHTML = `<span class="c-units">${getUsulUnitCount(name)}</span>${nameSpan}`;
    card.addEventListener("click", () => selectCarouselCard(i));
    carouselTrack.appendChild(card);
  });

  const padR = document.createElement("div");
  padR.style.cssText = "flex:0 0 calc(50% - 63px)";
  carouselTrack.appendChild(padR);

  carouselCards = carouselTrack.querySelectorAll(".carousel-card");
  selectedCardIndex = usulNames.indexOf(currentUsulName);
  scrollToCard(selectedCardIndex, "auto");
}

function scrollToCard(idx, behavior = "smooth") {
  idx = clamp(idx, 0, usulNames.length - 1);
  const card = carouselCards[idx];
  if (card) card.scrollIntoView({ behavior, inline: "center", block: "nearest" });
}

function selectCarouselCard(idx) {
  idx = clamp(idx, 0, usulNames.length - 1);
  if (idx === selectedCardIndex && usulNames[idx] === currentUsulName) return;
  selectedCardIndex = idx;
  carouselCards.forEach(c => c.classList.remove("active"));
  carouselCards[idx].classList.add("active");
  scrollToCard(idx);

  currentUsulName = usulNames[idx];
  pattern = usulDefs[currentUsulName];
  currentStep = 0;
  rebuildVisualization();
  restartTransportIfPlaying();
}

// Carousel: arrow buttons with hold-to-repeat
function addHoldRepeat(btn, action) {
  let timer = null, interval = null;
  const stop = () => { clearTimeout(timer); clearInterval(interval); timer = interval = null; };
  btn.addEventListener("pointerdown", e => {
    if (e.button !== 0) return;
    action();
    btn.setPointerCapture(e.pointerId);
    timer = setTimeout(() => { interval = setInterval(action, 100); }, 250);
  });
  btn.addEventListener("pointerup", stop);
  btn.addEventListener("pointercancel", stop);
  btn.addEventListener("lostpointercapture", stop);
}
addHoldRepeat(document.getElementById("carPrev"), () => selectCarouselCard(selectedCardIndex - 1));
addHoldRepeat(document.getElementById("carNext"), () => selectCarouselCard(selectedCardIndex + 1));

// Carousel: mouse wheel
carouselTrack.addEventListener("wheel", e => {
  e.preventDefault();
  const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  if (delta > 0) selectCarouselCard(selectedCardIndex + 1);
  else if (delta < 0) selectCarouselCard(selectedCardIndex - 1);
}, { passive: false });

// Carousel: drag (hasDragged ayırır tıklamayı sürüklemeden)
let dragStartX = 0, dragScrollLeft = 0, isDragging = false, hasDragged = false;
carouselTrack.addEventListener("pointerdown", e => {
  isDragging = true;
  hasDragged = false;
  dragStartX = e.clientX;
  dragScrollLeft = carouselTrack.scrollLeft;
  carouselTrack.style.scrollBehavior = "auto";
  carouselTrack.style.cursor = "grabbing";
  carouselTrack.setPointerCapture(e.pointerId);
});
carouselTrack.addEventListener("pointermove", e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  if (Math.abs(dx) > 4) hasDragged = true;
  carouselTrack.scrollLeft = dragScrollLeft - dx;
});
carouselTrack.addEventListener("pointerup", e => {
  if (!isDragging) return;
  isDragging = false;
  carouselTrack.style.scrollBehavior = "";
  carouselTrack.style.cursor = "";
  carouselTrack.releasePointerCapture(e.pointerId);
  if (!hasDragged) {
    // Tıklama: pointer'ın altındaki kartı bul
    const el = document.elementFromPoint(e.clientX, e.clientY)?.closest(".carousel-card");
    if (el) { const idx = parseInt(el.dataset.idx); if (!isNaN(idx)) selectCarouselCard(idx); }
    return;
  }
  // Sürükleme bitti: merkeze en yakın kartı yakala
  const trackRect = carouselTrack.getBoundingClientRect();
  const centerX = trackRect.left + trackRect.width / 2;
  let closestIdx = 0, minDist = Infinity;
  carouselCards.forEach((card, i) => {
    const cardRect = card.getBoundingClientRect();
    const dist = Math.abs(cardRect.left + cardRect.width / 2 - centerX);
    if (dist < minDist) { minDist = dist; closestIdx = i; }
  });
  selectCarouselCard(closestIdx);
});

// ── Disk Mode Toggle ────────────────────────────────────────────
const diskToggleBtn = document.getElementById("diskToggle");
diskToggleBtn.addEventListener("click", () => {
  diskMode = !diskMode;
  diskToggleBtn.setAttribute("aria-pressed", diskMode);
  if (!diskMode) {
    document.getElementById("segmentRing").style.transform = "";
  }
  fitBeatLabels();
});

// ── Theme Toggle ────────────────────────────────────────────────
function initTheme() {
  document.body.dataset.theme = "light";
  document.getElementById("themeToggle").textContent = "🌙";
}

document.getElementById("themeToggle").addEventListener("click", () => {
  const next = document.body.dataset.theme === "dark" ? "light" : "dark";
  document.body.dataset.theme = next;
  document.getElementById("themeToggle").textContent = next === "dark" ? "☀" : "🌙";
  // Re-render segment colors
  renderSegmentRing();
  buildBeatLabels();
});

// ── Rebuild All Visuals ─────────────────────────────────────────
function rebuildVisualization() {
  rebuildSegments();
  renderSegmentRing();
  buildBeatLabels();
  resizeSweepCanvas();
}

// ── Event Listeners ─────────────────────────────────────────────
document.getElementById("toggle").addEventListener("click", async () => {
  if (!isPlaying) await startTransport();
  else stopTransport();
});

// Hold-to-repeat for +/- buttons
function holdButton(btn, fn) {
  let tid, iid;
  function start(e) { e.preventDefault(); fn(); tid = setTimeout(() => { iid = setInterval(fn, 80); }, 400); }
  function stop() { clearTimeout(tid); clearInterval(iid); }
  btn.addEventListener("pointerdown", start);
  btn.addEventListener("pointerup", stop);
  btn.addEventListener("pointerleave", stop);
  btn.addEventListener("pointercancel", stop);
}

bpmNumber.addEventListener("change", e => setBpmValue(e.target.value));
holdButton(document.getElementById("bpmDec"), () => setBpmValue(bpm - 1));
holdButton(document.getElementById("bpmInc"), () => setBpmValue(bpm + 1));
dumNumber.addEventListener("change", e => setDumValue(e.target.value));
holdButton(document.getElementById("dumDec"), () => setDumValue(dumFreq - 1));
holdButton(document.getElementById("dumInc"), () => setDumValue(dumFreq + 1));
tekNumber.addEventListener("change", e => setTekValue(e.target.value));
holdButton(document.getElementById("tekDec"), () => setTekValue(tekFreq - 1));
holdButton(document.getElementById("tekInc"), () => setTekValue(tekFreq + 1));
volumeSlider.addEventListener("input", e => setVolumeValue(e.target.value));

// Mute toggles
document.getElementById("dumMute").addEventListener("click", () => {
  dumMuted = !dumMuted;
  updateMuteState();
});
document.getElementById("tekMute").addEventListener("click", () => {
  tekMuted = !tekMuted;
  updateMuteState();
});

document.getElementById("repeatCount").addEventListener("input", e => {
  e.target.value = clamp(Number(e.target.value) || 1, REPEAT_MIN, REPEAT_MAX);
});
const repeatEl = document.getElementById("repeatCount");
holdButton(document.getElementById("repeatDec"), () => { repeatEl.value = clamp(Number(repeatEl.value) - 1, REPEAT_MIN, REPEAT_MAX); });
holdButton(document.getElementById("repeatInc"), () => { repeatEl.value = clamp(Number(repeatEl.value) + 1, REPEAT_MIN, REPEAT_MAX); });
document.getElementById("renderWavBtn").addEventListener("click", () => renderSelectedPatternToWav());

// Scroll on sliders
function addScrollHandler(el, setter, getter, step) {
  el.addEventListener("wheel", e => { e.preventDefault(); setter(getter() + (e.deltaY < 0 ? step : -step)); }, {passive:false});
}
dumNumber.addEventListener("wheel", e => { e.preventDefault(); setDumValue(dumFreq + (e.deltaY < 0 ? 1 : -1)); }, {passive:false});
tekNumber.addEventListener("wheel", e => { e.preventDefault(); setTekValue(tekFreq + (e.deltaY < 0 ? 1 : -1)); }, {passive:false});
addScrollHandler(volumeSlider, setVolumeValue, () => volume, 2);
bpmNumber.addEventListener("wheel", e => { e.preventDefault(); setBpmValue(bpm + (e.deltaY < 0 ? 1 : -1)); }, {passive:false});
document.getElementById("repeatCount").addEventListener("wheel", e => {
  e.preventDefault();
  const el = e.target;
  el.value = clamp(Number(el.value) + (e.deltaY < 0 ? 1 : -1), REPEAT_MIN, REPEAT_MAX);
}, {passive:false});

// Resize handler
window.addEventListener("resize", () => {
  resizeSweepCanvas();
  fitBeatLabels();
});

// ── Init ────────────────────────────────────────────────────────
initTheme();
setBpmValue(bpm);
setDumValue(dumFreq);
setTekValue(tekFreq);
setVolumeValue(volume);
buildCarousel();
rebuildVisualization();
// Defer canvas sizing to after layout settles
requestAnimationFrame(() => resizeSweepCanvas());

// ── Compact Mode Detection ─────────────────────────────────────
// Min width for all 4 groups open + VUR + padding + gaps in a single row
const COMPACT_BREAKPOINT = 880;
function updateCompactMode() {
  document.body.dataset.compact = String(window.innerWidth < COMPACT_BREAKPOINT);
}
updateCompactMode();
window.addEventListener("resize", updateCompactMode);

// ── Mobile-first defaults: disk mode on, toggles open ──────────
diskMode = true;
diskToggleBtn.setAttribute("aria-pressed", "true");
fitBeatLabels();

if (document.body.dataset.compact === "true") {
  // Show panels (not group-expand — groups start collapsed)
  document.getElementById("controlsPanel").classList.add("open");
  document.getElementById("controlsPanel2").classList.add("open");
  document.getElementById("renderPanel").classList.add("panel-visible");
  const fBtn = document.getElementById("footerToggle");
  fBtn.setAttribute("aria-expanded", "true");
  fBtn.textContent = "\u25BC";
}

// ── Mobile Toggles ─────────────────────────────────────────────
document.getElementById("headerToggle").addEventListener("click", () => {
  const panel1 = document.getElementById("controlsPanel");
  const panel2 = document.getElementById("controlsPanel2");
  const btn = document.getElementById("headerToggle");
  const open = panel1.classList.toggle("open");
  panel2.classList.toggle("open", open);
  btn.setAttribute("aria-expanded", String(open));
  btn.textContent = open ? "\u25B2" : "\u25BC";
  if (document.body.dataset.compact === "true") {
    document.getElementById("toggle").style.display = "";
  }
});
document.getElementById("footerToggle").addEventListener("click", () => {
  const panel = document.getElementById("renderPanel");
  const btn = document.getElementById("footerToggle");
  const open = panel.classList.toggle("panel-visible");
  btn.setAttribute("aria-expanded", String(open));
  btn.textContent = open ? "\u25BC" : "\u25B2";
  // Sync header panels in compact mode
  if (document.body.dataset.compact === "true") {
    const p1 = document.getElementById("controlsPanel");
    const p2 = document.getElementById("controlsPanel2");
    p1.classList.toggle("open", open);
    p2.classList.toggle("open", open);
    document.getElementById("toggle").style.display = "";
  }
});

// ══════════════════════════════════════════════════════════════════
// COLLAPSIBLE GROUP SYSTEM
// ══════════════════════════════════════════════════════════════════

(function() {
  const SWIPE_CLOSE_PX = 30; // min drag distance (reserved for future use)

  // All expandable groups (header + footer)
  const expandGroups = document.querySelectorAll("[data-expand]");

  // ── Generic open/close helpers ──
  function openGroup(group) { group.classList.add("open"); }
  function closeGroup(group) { group.classList.remove("open"); }
  function isOpen(group) { return group.classList.contains("open"); }

  // ── 1) Click-to-toggle for non-volume groups ──
  // For BPM: click on bpmIcon toggles
  // For TEK: click on tekMute toggles (when closed → open; when open → mute function)
  // For DÜM: click on dumMute toggles (when closed → open; when open → mute function)
  // For Render: click on renderWavBtn toggles (when closed → open; when open → render function)

  function setupGroupToggle(group, triggerEl, actionFn) {
    triggerEl.addEventListener("click", (e) => {
      if (group.id === "volumeGroup") return; // volume handled separately
      if (!isOpen(group)) {
        e.preventDefault();
        e.stopImmediatePropagation();
        openGroup(group);
      }
      // If already open, let the original handler run (mute, render, etc.)
    }, true); // capture phase to intercept before existing handlers
  }

  function isCompact() { return document.body.dataset.compact === "true"; }

  // BPM group: clock icon opens when closed; when open, tap-tempo runs (close via handle)
  const bpmGroup = document.getElementById("bpmGroup");
  const bpmIcon = document.getElementById("bpmIcon");
  bpmIcon.addEventListener("click", (e) => {
    if (isCompact()) return; // mobile: always open, let tap-tempo run
    if (!isOpen(bpmGroup)) {
      e.stopImmediatePropagation();
      openGroup(bpmGroup);
    }
  }, true);

  // TEK group: T button opens when closed
  const tekGroup = document.getElementById("tekGroup");
  const tekMuteBtn = document.getElementById("tekMute");
  tekMuteBtn.addEventListener("click", (e) => {
    if (isCompact()) return; // mobile: always open, let mute run
    if (!isOpen(tekGroup)) {
      e.preventDefault();
      e.stopImmediatePropagation();
      openGroup(tekGroup);
    }
  }, true);

  // DÜM group: D button opens when closed
  const dumGroup = document.getElementById("dumGroup");
  const dumMuteBtn = document.getElementById("dumMute");
  dumMuteBtn.addEventListener("click", (e) => {
    if (isCompact()) return; // mobile: always open, let mute run
    if (!isOpen(dumGroup)) {
      e.preventDefault();
      e.stopImmediatePropagation();
      openGroup(dumGroup);
    }
  }, true);

  // Render group: download button opens when closed
  const renderPanel = document.getElementById("renderPanel");
  const renderBtn = document.getElementById("renderWavBtn");
  renderBtn.addEventListener("click", (e) => {
    if (isCompact()) return;
    if (!isOpen(renderPanel)) {
      e.preventDefault();
      e.stopImmediatePropagation();
      openGroup(renderPanel);
    }
    // If open → existing render handler runs
  }, true);

  // ── 2) Volume group: click = mute, hover = expand slider ──
  const volumeGroup = document.getElementById("volumeGroup");
  const volumeIconEl = document.getElementById("volumeIcon");

  volumeIconEl.addEventListener("click", () => {
    if (volume > 0) {
      volumeBeforeMute = volume;
      setVolumeValue(0);
    } else {
      setVolumeValue(volumeBeforeMute || 100);
    }
  });

  volumeIconEl.addEventListener("mouseenter", () => openGroup(volumeGroup));
  volumeGroup.addEventListener("mouseleave", () => closeGroup(volumeGroup));

  // ── 3) Close mechanism: handle click ──
  expandGroups.forEach(group => {
    if (group.id === "volumeGroup") return;
    const handle = group.querySelector(".group-expand-handle");
    if (!handle) return;
    handle.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isOpen(group)) closeGroup(group);
    });
  });

})();
</script>
