// ── Color mapping for segment types ─────────────────────────────
const SEGMENT_COLORS = {dum:"--dum",tek:"--tek",teke:"--teke",teka:"--teka",tekka:"--tekka",tahek:"--tahek"};

function getSegColor(type) {
  return getComputedStyle(document.body).getPropertyValue(SEGMENT_COLORS[type] || "--tek").trim();
}

// ── Compound Beat Detection ─────────────────────────────────────
function baseLabel(lbl) { return lbl.replace(/[\d.½]+$/, ""); }

function analyzePattern(events) {
  const segments = [];
  let i = 0;
  while (i < events.length) {
    const curr = events[i];
    const cb = baseLabel(curr.label);
    const next = events[i + 1];
    const nb = next ? baseLabel(next.label) : null;

    if (cb === "te" && nb === "ke" && curr.kind === "weakRight" && next.kind === "weakLeft") {
      segments.push({ type:"teke", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (cb === "te" && nb === "kâ" && curr.kind === "weakRight" && next.kind === "weakLeft") {
      segments.push({ type:"teka", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (cb === "tek" && nb === "kâ" && curr.kind === "weakRight" && next.kind === "weakLeft") {
      segments.push({ type:"tekka", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (cb === "ta" && nb === "hek" && next && next.kind === "bothWeak") {
      segments.push({ type:"tahek", units:curr.units+next.units, events:[curr,next], startIdx:i });
      i += 2;
    } else if (curr.kind === "dum") {
      segments.push({ type:"dum", units:curr.units, events:[curr], startIdx:i });
      i++;
    } else {
      segments.push({ type:"tek", units:curr.units, events:[curr], startIdx:i });
      i++;
    }
  }
  return segments;
}

// Build a lookup: eventIndex → segmentIndex
let eventToSegment = [];
let visualSegments = [];
let totalUnits = 0;

function rebuildSegments() {
  visualSegments = analyzePattern(pattern);
  totalUnits = visualSegments.reduce((s, seg) => s + seg.units, 0);
  eventToSegment = [];
  visualSegments.forEach((seg, si) => {
    seg.events.forEach((_, ei) => {
      eventToSegment[seg.startIdx + ei] = si;
    });
  });
}

// ── SVG Pie Chart ───────────────────────────────────────────────
function polarToCart(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function renderSegmentRing() {
  const svg = document.getElementById("segmentRing");
  svg.innerHTML = "";
  const cx = 100, cy = 100, r = 95;
  const GAP = 0.8;
  const degPerUnit = 360 / totalUnits;
  let startAngle = 0;

  visualSegments.forEach((seg, i) => {
    const sweep = seg.units * degPerUnit - GAP;
    const endAngle = startAngle + sweep;
    const largeArc = sweep > 180 ? 1 : 0;
    const p1 = polarToCart(cx, cy, r, startAngle);
    const p2 = polarToCart(cx, cy, r, endAngle);

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d",
      `M${cx},${cy} L${p1.x.toFixed(2)},${p1.y.toFixed(2)} A${r},${r},0,${largeArc},1,${p2.x.toFixed(2)},${p2.y.toFixed(2)} Z`
    );
    path.setAttribute("fill", getSegColor(seg.type));
    path.setAttribute("data-seg", i);
    path.classList.add("seg-path");
    svg.appendChild(path);

    startAngle += seg.units * degPerUnit;
  });
}

// ── Segment Click Sound ────────────────────────────────────────
function activateBeatLabel(eventIdx, durationMs) {
  clearKaraokeHighlight();
  const span = beatLabelSpans[eventIdx];
  if (!span) return;
  const segIdx = eventToSegment[eventIdx];
  const color = segIdx !== undefined ? getSegColor(visualSegments[segIdx].type) : getSegColor("tek");
  span.style.setProperty("--active-bg", color);
  span.classList.add("active");
  lastActiveEventIdx = eventIdx;
  setTimeout(() => {
    span.classList.remove("active");
    span.style.removeProperty("--active-bg");
    if (lastActiveEventIdx === eventIdx) lastActiveEventIdx = -1;
  }, durationMs);
}

function clickHandBar(event, segUnits) {
  const vol = volume / VOL_MAX;
  if (vol < 0.05) return;
  const color = getSegColor(event.kind === "dum" ? "dum" : "tek");
  const retractMs = Math.max(80, segUnits * secondsPerBeat() * 0.5 * 1000);
  if (eventHasRightSide(event)) {
    rightBar.style.background = color;
    rightBar.style.transition = "transform 0.06s ease-out";
    rightBar.style.transform = `scaleY(${vol})`;
    setTimeout(() => { rightBar.style.transition = `transform ${retractMs}ms linear`; rightBar.style.transform = "scaleY(0)"; }, 60);
  }
  if (eventHasLeftSide(event)) {
    leftBar.style.background = color;
    leftBar.style.transition = "transform 0.06s ease-out";
    leftBar.style.transform = `scaleY(${vol})`;
    setTimeout(() => { leftBar.style.transition = `transform ${retractMs}ms linear`; leftBar.style.transform = "scaleY(0)"; }, 60);
  }
}

let segClickLocked = false;
document.getElementById("segmentRing").addEventListener("click", e => {
  if (isPlaying || segClickLocked) return;
  const path = e.target.closest(".seg-path");
  if (!path) return;
  const segIdx = Number(path.dataset.seg);
  const seg = visualSegments[segIdx];
  if (!seg) return;
  if (audioCtx.state === "suspended") audioCtx.resume();
  const now = audioCtx.currentTime + 0.02;
  const spb = secondsPerBeat();
  const farFuture = now + seg.units * spb + 2;
  const evIdx0 = seg.startIdx;
  const totalMs = seg.units * spb * 1000;

  const ring = document.getElementById("segmentRing");
  segClickLocked = true;
  ring.classList.add("seg-locked");
  bpmPulsePaused = true;
  for (let u = 0; u < Math.floor(seg.units); u++) {
    setTimeout(pulseRing, u * spb * 1000);
  }
  setTimeout(() => { segClickLocked = false; ring.classList.remove("seg-locked"); bpmPulsePaused = false; }, totalMs);

  function clickPlayEvent(ev, time, nextTime) {
    if (ev.kind === "dum") liveEngine.playDum(time, nextTime, dumFreq, bpm, 1.0);
    else if (ev.kind === "weakLeft") liveEngine.playWeakHit(time, nextTime, tekFreq, PAN_LEFT, bpm, 1.0);
    else if (ev.kind === "weakRight") liveEngine.playWeakHit(time, nextTime, tekFreq, PAN_RIGHT, bpm, 1.0);
    else if (ev.kind === "bothWeak") liveEngine.playHek(time, nextTime, nextTime, tekFreq, bpm, 1.0);
  }

  if (seg.events.length === 1) {
    clickPlayEvent(seg.events[0], now, farFuture);
    pulseSegment(segIdx);
    clickHandBar(seg.events[0], seg.units);
    activateBeatLabel(evIdx0, totalMs);
  } else {
    const gap = seg.events[0].units * spb;
    const gapMs = gap * 1000;
    clickPlayEvent(seg.events[0], now, now + gap);
    clickPlayEvent(seg.events[1], now + gap, farFuture);
    pulseSegment(segIdx);
    clickHandBar(seg.events[0], seg.events[0].units);
    activateBeatLabel(evIdx0, gapMs);
    setTimeout(() => {
      pulseSegment(segIdx);
      clickHandBar(seg.events[1], seg.events[1].units);
      activateBeatLabel(evIdx0 + 1, seg.events[1].units * spb * 1000);
    }, gapMs);
  }
});

// ── Canvas Sweep Hand ───────────────────────────────────────────
let sweepRafId = null;
const sweepCanvas = document.getElementById("sweepCanvas");
const sweepCtx = sweepCanvas.getContext("2d");

function resizeSweepCanvas() {
  const container = sweepCanvas.parentElement;
  const w = container.clientWidth;
  sweepCanvas.width = w * devicePixelRatio;
  sweepCanvas.height = w * devicePixelRatio;
  sweepCanvas.style.width = w + "px";
  sweepCanvas.style.height = w + "px";
}

let tipPulse = 0;
let tipPulseTime = 0;
const TIP_PULSE_DECAY = 5; // per second

function triggerTipPulse() {
  tipPulse = 1;
  tipPulseTime = performance.now();
}

function drawHand(cx, cy, ex, ey, r, vol) {
  const dpr = devicePixelRatio;
  const sweepColor = getComputedStyle(document.body).getPropertyValue("--sweep").trim();
  const glowColor = getComputedStyle(document.body).getPropertyValue("--sweep-glow").trim();

  // Tapered gradient line
  const grad = sweepCtx.createLinearGradient(cx, cy, ex, ey);
  grad.addColorStop(0, "transparent");
  grad.addColorStop(0.15, sweepColor);
  grad.addColorStop(1, sweepColor);

  // Soft glow layer
  if (vol > 0.1) {
    sweepCtx.save();
    sweepCtx.shadowColor = glowColor;
    sweepCtx.shadowBlur = (8 + vol * 12) * dpr;
    sweepCtx.strokeStyle = glowColor;
    sweepCtx.lineWidth = (3 + vol * 4) * dpr;
    sweepCtx.lineCap = "round";
    sweepCtx.beginPath();
    sweepCtx.moveTo(cx, cy);
    sweepCtx.lineTo(ex, ey);
    sweepCtx.stroke();
    sweepCtx.restore();
  }

  // Main hand with gradient
  sweepCtx.strokeStyle = grad;
  sweepCtx.lineWidth = (1.5 + vol * 1.5) * dpr;
  sweepCtx.lineCap = "round";
  sweepCtx.beginPath();
  sweepCtx.moveTo(cx, cy);
  sweepCtx.lineTo(ex, ey);
  sweepCtx.stroke();

  // Tip pulse decay
  const dtSec = (performance.now() - tipPulseTime) / 1000;
  tipPulse = Math.max(0, 1 - dtSec * TIP_PULSE_DECAY);
  const p = tipPulse * vol;

  // Tip dot: base radius 3.5, pulse expands to +4
  const baseR = 3.5 * dpr;
  const tipR = baseR + p * 4 * dpr;
  const tipGlow = (8 + vol * 10 + p * 20) * dpr;

  sweepCtx.save();
  sweepCtx.shadowColor = sweepColor;
  sweepCtx.shadowBlur = tipGlow;
  sweepCtx.fillStyle = sweepColor;
  sweepCtx.beginPath();
  sweepCtx.arc(ex, ey, tipR, 0, Math.PI * 2);
  sweepCtx.fill();
  sweepCtx.restore();
}

function drawSweep() {
  if (!isPlaying) return;
  const w = sweepCanvas.width, h = sweepCanvas.height;
  const cx = w / 2, cy = h / 2, r = w * 0.475;
  sweepCtx.clearRect(0, 0, w, h);

  const cycleDuration = totalUnits * secondsPerBeat();
  const elapsed = audioCtx.currentTime - cycleStartTime;
  let progress = (elapsed % cycleDuration) / cycleDuration;
  if (progress < 0) progress = 0;

  // Reset cycle start when wrapping
  if (elapsed > cycleDuration) {
    const fullCycles = Math.floor(elapsed / cycleDuration);
    cycleStartTime += fullCycles * cycleDuration;
  }

  const vol = volume / VOL_MAX;

  if (diskMode) {
    const svgEl = document.getElementById("segmentRing");
    svgEl.style.transform = `rotate(${-progress * 360}deg)`;
    drawHand(cx, cy, cx, cy - r, r, vol);
  } else {
    const angle = progress * 2 * Math.PI - Math.PI / 2;
    const ex = cx + r * Math.cos(angle);
    const ey = cy + r * Math.sin(angle);
    drawHand(cx, cy, ex, ey, r, vol);
  }


  // Update active beat label (karaoke)
  updateKaraokeHighlight(progress);

  sweepRafId = requestAnimationFrame(drawSweep);
}

function startSweepAnimation() {
  resizeSweepCanvas();
  if (sweepRafId) cancelAnimationFrame(sweepRafId);
  sweepRafId = requestAnimationFrame(drawSweep);
}

function stopSweepAnimation() {
  if (sweepRafId) { cancelAnimationFrame(sweepRafId); sweepRafId = null; }
  sweepCtx.clearRect(0, 0, sweepCanvas.width, sweepCanvas.height);
  clearKaraokeHighlight();
  // Reset hand guidance bars
  leftBar.style.transform = "scaleY(0)";
  rightBar.style.transform = "scaleY(0)";
  // Reset disk rotation
  document.getElementById("segmentRing").style.transform = "";
}

// ── Segment Pulse ───────────────────────────────────────────────
const SEG_FLASH_KEYFRAMES = [
  { filter: 'brightness(1.6) saturate(1.4)', transform: 'scale(1.03)', offset: 0 },
  { filter: 'brightness(1.25) saturate(1.15)', transform: 'scale(1.01)', offset: 0.4 },
  { filter: 'brightness(1) saturate(1)', transform: 'scale(1)', offset: 1 }
];
function pulseSegment(segIndex) {
  const vol = volume / VOL_MAX;
  if (vol < 0.05) return;
  triggerTipPulse();
  const path = document.querySelector(`.seg-path[data-seg="${segIndex}"]`);
  if (!path) return;
  const spbMs = secondsPerBeat() * 1000;
  const dur = Math.max(100, Math.min(350, spbMs * 0.35));
  path.getAnimations().forEach(a => a.cancel());
  path.animate(SEG_FLASH_KEYFRAMES, { duration: dur, easing: 'ease-out' });
}

// ── Hand Guidance Bars ──────────────────────────────────────────
const leftBar = document.getElementById("leftBar");
const rightBar = document.getElementById("rightBar");

// Son sağ/sol segment birimlerini hatırla (retract hesabı için)
let lastRightSegUnits = 1;
let lastLeftSegUnits = 1;

function triggerHandBar(event, audioTime, rightNextTime, leftNextTime, segUnits) {
  const vol = volume / VOL_MAX;
  if (vol < 0.05) return;
  const delay = Math.max(0, (audioTime - audioCtx.currentTime) * 1000);
  const color = getSegColor(event.kind === "dum" ? "dum" : "tek");
  const spb = secondsPerBeat();

  if (eventHasRightSide(event)) {
    // Sonraki sağ vuruş aynı tarafta mı, karşıt tarafta mı?
    const sameNext = rightNextTime <= leftNextTime;
    const retractUnits = sameNext ? segUnits : lastLeftSegUnits;
    const retractMs = Math.max(80, retractUnits * spb * 0.5 * 1000);
    lastRightSegUnits = segUnits;
    setTimeout(() => {
      rightBar.style.background = color;
      rightBar.style.transition = "transform 0.06s ease-out";
      rightBar.style.transform = `scaleY(${vol})`;
      setTimeout(() => {
        rightBar.style.transition = `transform ${retractMs}ms linear`;
        rightBar.style.transform = "scaleY(0)";
      }, 60);
    }, delay);
  }

  if (eventHasLeftSide(event)) {
    const sameNext = leftNextTime <= rightNextTime;
    const retractUnits = sameNext ? segUnits : lastRightSegUnits;
    const retractMs = Math.max(80, retractUnits * spb * 0.5 * 1000);
    lastLeftSegUnits = segUnits;
    setTimeout(() => {
      leftBar.style.background = color;
      leftBar.style.transition = "transform 0.06s ease-out";
      leftBar.style.transform = `scaleY(${vol})`;
      setTimeout(() => {
        leftBar.style.transition = `transform ${retractMs}ms linear`;
        leftBar.style.transform = "scaleY(0)";
      }, 60);
    }, delay);
  }
}

// ── Beat Labels ─────────────────────────────────────────────────
let beatLabelSpans = [];

function formatLabelDisplay(lbl) {
  return lbl.replace(/0\.5/g, "½");
}

function getSepAfter(label, nextLabel) {
  const base = label.replace(/[0-9½.]/g, "");
  if (base === "te" || base === "ta") return "-";
  if (base === "tek" && nextLabel && nextLabel.replace(/[0-9½.]/g, "") === "kâ") return "-";
  return " · ";
}

function buildBeatLabels() {
  const container = document.getElementById("beatLabels");
  container.innerHTML = "";
  beatLabelSpans = [];

  let dashGroup = null;
  pattern.forEach((ev, i) => {
    const prevSep = i > 0 ? getSepAfter(pattern[i - 1].label, ev.label) : null;
    const isDash = prevSep && prevSep.trim() === "-";

    if (i > 0 && !isDash && dashGroup) {
      container.appendChild(dashGroup);
      dashGroup = null;
    }

    if (i > 0) {
      const sep = document.createElement("span");
      sep.className = isDash ? "sep sep-dash" : "sep";
      sep.textContent = prevSep;
      if (isDash) {
        if (!dashGroup) {
          dashGroup = document.createElement("span");
          dashGroup.style.whiteSpace = "nowrap";
          const prev = container.lastElementChild;
          if (prev) { container.removeChild(prev); dashGroup.appendChild(prev); }
        }
        dashGroup.appendChild(sep);
      } else {
        container.appendChild(sep);
      }
    }

    const span = document.createElement("span");
    span.textContent = formatLabelDisplay(ev.label);
    span.dataset.eventIdx = i;
    const segIdx = eventToSegment[i];
    if (segIdx !== undefined) {
      span.style.color = getSegColor(visualSegments[segIdx].type);
    }
    if (dashGroup) {
      dashGroup.appendChild(span);
    } else {
      container.appendChild(span);
    }
    beatLabelSpans.push(span);
  });
  if (dashGroup) container.appendChild(dashGroup);

  fitBeatLabels();

}

function clearAlignedLabels() {
  const container = document.getElementById("beatLabels");
  container.classList.remove("aligned");
  container.style.height = "";
  // Clear inline position styles from spans and dashGroups
  beatLabelSpans.forEach(sp => { sp.style.position = ""; sp.style.left = ""; sp.style.transform = ""; });
  container.querySelectorAll(".sep-dash").forEach(s => { s.style.left = ""; s.style.transform = ""; s.style.position = ""; s.style.color = ""; s.style.fontWeight = ""; s.style.opacity = ""; });
  // Restore dashGroup display (they get display:contents in aligned mode)
  container.querySelectorAll("span[style*='contents']").forEach(g => { g.style.display = ""; });
}

function alignBeatLabels() {
  const container = document.getElementById("beatLabels");
  const svg = document.querySelector("#notationDisplay svg");
  if (!svg || !notationNotePositions.length || !beatLabelSpans.length) return false;

  const vbAttr = svg.getAttribute("viewBox");
  if (!vbAttr) return false;
  const [vbX, , vbW] = vbAttr.split(" ").map(Number);
  const svgRect = svg.getBoundingClientRect();
  const containerRect = container.parentElement.getBoundingClientRect();
  if (svgRect.width === 0) return false;

  // viewBox x → pixel x relative to beat-info parent
  function notePixelLeft(noteIdx) {
    const pos = notationNotePositions[noteIdx];
    if (!pos) return null;
    return svgRect.left + (pos.x - vbX) / vbW * svgRect.width - containerRect.left;
  }

  container.classList.add("aligned");

  // Make dashGroups transparent to positioning
  for (const child of container.children) {
    if (!child.classList.contains("sep") && !child.dataset.eventIdx && child.children.length > 0) {
      child.style.display = "contents";
    }
  }

  // Position each beat label span left-aligned to its highlight rect
  for (let i = 0; i < beatLabelSpans.length; i++) {
    const sp = beatLabelSpans[i];
    const evIdx = Number(sp.dataset.eventIdx);
    const noteIdx = notationEventToNote[evIdx];
    const px = notePixelLeft(noteIdx);
    if (px === null) continue;
    sp.style.position = "absolute";
    sp.style.left = px + "px";
    sp.style.transform = "";
  }

  // Position dash separators centered between their adjacent spans, with matching color
  container.querySelectorAll(".sep-dash").forEach(sep => {
    const prev = sep.previousElementSibling;
    const next = sep.nextElementSibling;
    if (!prev || !next) return;
    const prevIdx = notationEventToNote[Number(prev.dataset.eventIdx)];
    const nextIdx = notationEventToNote[Number(next.dataset.eventIdx)];
    const px1 = notePixelLeft(prevIdx);
    const px2 = notePixelLeft(nextIdx);
    if (px1 === null || px2 === null) return;
    // Center between right edge of prev span and left edge of next span
    const prevRight = px1 + prev.offsetWidth;
    const mid = (prevRight + px2) / 2;
    sep.style.position = "absolute";
    sep.style.left = mid + "px";
    sep.style.transform = "translateX(-50%)";
    sep.style.color = prev.style.color || "";
    sep.style.fontWeight = "700";
    sep.style.opacity = "0.85";
  });

  return true;
}

function fitBeatLabels() {
  const container = document.getElementById("beatLabels");
  const parent = container.parentElement;
  const maxWidth = parent.clientWidth;

  // Reset all states
  clearAlignedLabels();
  container.classList.remove("marquee", "fitted");
  container.style.transform = "";
  container.style.transition = "";
  container.style.fontSize = "";

  // Aligned mode: spans positioned under notation notes
  if (shouldAlignLabels()) {
    if (alignBeatLabels()) return;
  }

  // Disk mode + playing: always marquee
  if (diskMode && isPlaying) {
    container.classList.add("marquee");
    return;
  }

  // Fits in one line at default font → done
  if (container.scrollWidth <= maxWidth) return;

  // Try font shrink + wrap (max 2 lines)
  container.classList.add("fitted");
  for (let fs = 15; fs >= 9; fs -= 0.5) {
    container.style.fontSize = fs + "px";
    const maxH = fs * 1.3 * 2.5; // line-height:1.3, 2 lines + span padding tolerance
    if (container.scrollHeight <= maxH && container.scrollWidth <= maxWidth) break;
  }
}

function scrollMarqueeToSpan(span, durationSec) {
  const container = document.getElementById("beatLabels");
  if (!container.classList.contains("marquee") || !span) return;
  const parentRect = container.parentElement.getBoundingClientRect();
  const spanRect = span.getBoundingClientRect();
  const parentCenter = parentRect.left + parentRect.width / 2;
  const spanCenter = spanRect.left + spanRect.width / 2;
  const currentTx = parseFloat(container.style.transform.replace(/[^-\d.]/g, '')) || 0;
  const dur = Math.max(0.08, Math.min(0.6, durationSec * 0.4));
  container.style.transition = "transform " + dur.toFixed(3) + "s ease-out";
  container.style.transform = "translateX(" + (currentTx + parentCenter - spanCenter) + "px)";
}

// ── Karaoke Highlight ───────────────────────────────────────────
let lastActiveEventIdx = -1;

function updateKaraokeHighlight(progress) {
  // Find which event is active based on progress
  let accumulated = 0;
  let activeIdx = 0;
  for (let i = 0; i < pattern.length; i++) {
    const evPortion = pattern[i].units / totalUnits;
    if (accumulated + evPortion > progress + 0.001) {
      activeIdx = i;
      break;
    }
    accumulated += evPortion;
    if (i === pattern.length - 1) activeIdx = i;
  }

  if (activeIdx !== lastActiveEventIdx) {
    if (lastActiveEventIdx >= 0 && beatLabelSpans[lastActiveEventIdx]) {
      beatLabelSpans[lastActiveEventIdx].classList.remove("active");
      beatLabelSpans[lastActiveEventIdx].style.removeProperty("--active-bg");
    }
    if (beatLabelSpans[activeIdx]) {
      const segIdx = eventToSegment[activeIdx];
      const color = segIdx !== undefined ? getSegColor(visualSegments[segIdx].type) : getSegColor("tek");
      beatLabelSpans[activeIdx].style.setProperty("--active-bg", color);
      beatLabelSpans[activeIdx].classList.add("active");
      const eventSec = pattern[activeIdx].units * secondsPerBeat();
      scrollMarqueeToSpan(beatLabelSpans[activeIdx], eventSec);
      // Notation highlight
      updateNotationHighlight(activeIdx, color);
    }
    lastActiveEventIdx = activeIdx;
  }
}

function clearKaraokeHighlight() {
  beatLabelSpans.forEach(sp => { sp.classList.remove("active"); sp.style.removeProperty("--active-bg"); });
  lastActiveEventIdx = -1;
  const container = document.getElementById("beatLabels");
  if (container) { container.style.transition = ""; container.style.transform = ""; }
  clearNotationHighlight();
}

// ── Volume Icon Pulse (anchor-based BPM timer — drift-free) ──────
let volPulseTimer = null;
let volPulseNeedsSync = false;
let volPulseAnchor = 0;
let volPulseCount = 0;
function volPulseTick() {
  if (!isPlaying || volume === 0) return;
  const vi = document.getElementById("volumeIcon");
  vi.classList.remove("pulse"); void vi.offsetWidth; vi.classList.add("pulse");
  volPulseCount++;
  const nextTime = volPulseAnchor + volPulseCount * (60000 / bpm);
  volPulseTimer = setTimeout(volPulseTick, Math.max(0, nextTime - performance.now()));
}
function startVolPulse() {
  stopVolPulse();
  volPulseAnchor = performance.now();
  volPulseCount = 1;
  volPulseTimer = setTimeout(volPulseTick, 60000 / bpm);
}
function resyncVolPulse(delayMs) {
  stopVolPulse();
  volPulseAnchor = performance.now() + delayMs;
  volPulseCount = 0;
  volPulseTimer = setTimeout(volPulseTick, delayMs);
}
function stopVolPulse() {
  if (volPulseTimer) { clearTimeout(volPulseTimer); volPulseTimer = null; }
}

// ── onScheduledEvent callback ───────────────────────────────────
onScheduledEvent = function(stepIndex, audioTime, event, rightNext, leftNext) {
  const delayMs = Math.max(0, (audioTime - audioCtx.currentTime) * 1000);
  const spbMs = secondsPerBeat() * 1000;
  const segIdx = eventToSegment[stepIndex];
  if (segIdx !== undefined) setTimeout(() => pulseSegment(segIdx), delayMs);
  // Ring pulse: once at event start + extra at each unit boundary within multi-unit events
  setTimeout(pulseRing, delayMs);
  for (let u = 1; u < event.units; u++) {
    setTimeout(pulseRing, delayMs + u * spbMs);
  }
  const segUnits = segIdx !== undefined ? visualSegments[segIdx].units : event.units;
  triggerHandBar(event, audioTime, rightNext, leftNext, segUnits);
  // Beat-color: transition toward NEXT beat's color over this event's duration
  const nextEvt = pattern[(stepIndex + 1) % pattern.length];
  const nextMix = nextEvt.kind === "dum" ? "0" : "1";
  setTimeout(() => {
    const tb = document.getElementById("toggle");
    const transDur = spbMs * 0.5;
    const delayDur = event.units * spbMs - transDur;
    tb.style.setProperty("--btn-delay", delayDur + "ms");
    tb.style.setProperty("--btn-trans", transDur + "ms");
    tb.style.setProperty("--btn-mix", nextMix);
  }, delayMs);
  // Mute button pulses (once per event)
  if (volume > 0) {
    setTimeout(() => {
      if (event.kind === "dum" && !dumMuted) {
        const db = document.getElementById("dumMute");
        db.classList.remove("pulse"); void db.offsetWidth; db.classList.add("pulse");
      }
      if (event.kind !== "dum" && !tekMuted) {
        const tb = document.getElementById("tekMute");
        tb.classList.remove("pulse"); void tb.offsetWidth; tb.classList.add("pulse");
      }
    }, delayMs);
    // Resync volume pulse timer to this event's timing (after speed change)
    if (volPulseNeedsSync) {
      volPulseNeedsSync = false;
      resyncVolPulse(delayMs);
    }
  }
};

// ── Carousel ────────────────────────────────────────────────────
const carouselTrack = document.getElementById("carouselTrack");
let selectedCardIndex = 0;
const usulNames = Object.keys(usulDefs);

// ── Carousel: slot-machine reel ──
let carReel = null;
let itemCenters = [];   // center-X of each item relative to reel origin
let reelX = 0;          // current translateX of the reel
let snapRaf = null;

function buildCarousel() {
  carouselTrack.innerHTML = "";
  carReel = document.createElement("div");
  carReel.className = "car-reel";
  usulNames.forEach((name, i) => {
    const sp = document.createElement("span");
    sp.className = "car-item";
    sp.dataset.idx = i;
    sp.innerHTML = `${name}<sup class="car-units">${getUsulUnitCount(name)}</sup>`;
    sp.addEventListener("click", () => {
      if (!carouselTrack.classList.contains("dragging")) {
        selectCarouselCard(i);
        snapToIndex(i, true);
      }
    });
    carReel.appendChild(sp);
  });
  carouselTrack.appendChild(carReel);
  selectedCardIndex = usulNames.indexOf(currentUsulName);
  requestAnimationFrame(() => {
    measureItems();
    reelX = -itemCenters[selectedCardIndex];
    applyReelX();
    updateItemDepth();
  });
}

function measureItems() {
  // Temporarily remove transforms so measurements are clean
  const items = carReel.children;
  for (let i = 0; i < items.length; i++) {
    items[i].style.transform = "";
    items[i].style.opacity = "";
  }
  itemCenters = [];
  const reelRect = carReel.getBoundingClientRect();
  for (let i = 0; i < items.length; i++) {
    const r = items[i].getBoundingClientRect();
    itemCenters.push(r.left + r.width / 2 - reelRect.left);
  }
}

function applyReelX() {
  carReel.style.transform = `translateX(${reelX}px)`;
}

function updateItemDepth() {
  const trackWidth = carouselTrack.getBoundingClientRect().width;
  const fadeRange = trackWidth * 0.44;
  const items = carReel.children;
  for (let i = 0; i < items.length; i++) {
    const dist = Math.abs(itemCenters[i] + reelX);  // distance from track center (reel has left:50%)
    const t = Math.min(dist / fadeRange, 1);  // 0 = center, 1 = edge
    const scale = 1.25 - t * 0.5;            // 1.25 → 0.75
    const opacity = 1 - t * 0.82;            // 1 → 0.18
    items[i].style.transform = `scale(${scale})`;
    items[i].style.opacity = Math.max(0, opacity);
    items[i].style.color = t < 0.12 ? 'var(--text)' : 'var(--text2)';
    items[i].style.fontWeight = t < 0.12 ? '700' : '600';
  }
}

function nearestItemIndex() {
  const target = -reelX;
  let best = 0, bestD = Infinity;
  for (let i = 0; i < itemCenters.length; i++) {
    const d = Math.abs(itemCenters[i] - target);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function selectCarouselCard(idx) {
  idx = clamp(idx, 0, usulNames.length - 1);
  if (idx === selectedCardIndex && usulNames[idx] === currentUsulName) return;
  selectedCardIndex = idx;
  currentUsulName = usulNames[idx];
  pattern = usulDefs[currentUsulName];
  currentStep = 0;
  rebuildVisualization();
  updateNotation();
  restartTransportIfPlaying();
}

function snapToIndex(idx, animate) {
  idx = clamp(idx, 0, usulNames.length - 1);
  const targetX = -itemCenters[idx];
  if (!animate) {
    reelX = targetX;
    applyReelX();
    updateItemDepth();
    if (idx !== selectedCardIndex) selectCarouselCard(idx);
    return;
  }
  cancelAnimationFrame(snapRaf);
  let v = 0;
  (function tick() {
    const force = (targetX - reelX) * 0.13;
    v = (v + force) * 0.72;
    reelX += v;
    applyReelX();
    updateItemDepth();
    if (Math.abs(reelX - targetX) < 0.4 && Math.abs(v) < 0.1) {
      reelX = targetX;
      applyReelX();
      updateItemDepth();
      if (idx !== selectedCardIndex) selectCarouselCard(idx);
      snapRaf = null;
      return;
    }
    snapRaf = requestAnimationFrame(tick);
  })();
}

// Drag + momentum
(function() {
  let startX = 0, startReelX = 0, pid = -1, dragging = false;
  let lastX = 0, lastT = 0, velocity = 0;
  let momentumRaf = null;
  const FRICTION = 0.955;
  const minX = () => -itemCenters[itemCenters.length - 1];
  const maxX = () => -itemCenters[0];

  function rubberBand(x) {
    const lo = minX(), hi = maxX();
    if (x > hi) return hi + (x - hi) * 0.25;
    if (x < lo) return lo + (x - lo) * 0.25;
    return x;
  }

  function stopAll() {
    cancelAnimationFrame(momentumRaf);
    cancelAnimationFrame(snapRaf);
    momentumRaf = snapRaf = null;
  }

  carouselTrack.addEventListener("pointerdown", e => {
    stopAll();
    startX = e.clientX; startReelX = reelX;
    lastX = e.clientX; lastT = e.timeStamp;
    velocity = 0; pid = e.pointerId; dragging = false;
  });

  carouselTrack.addEventListener("pointermove", e => {
    if (e.pointerId !== pid) return;
    const dx = e.clientX - startX;
    if (!dragging && Math.abs(dx) > 8) {
      dragging = true;
      carouselTrack.setPointerCapture(e.pointerId);
      carouselTrack.classList.add("dragging");
    }
    if (dragging) {
      e.preventDefault();
      const dt = Math.max(e.timeStamp - lastT, 1);
      velocity = (e.clientX - lastX) / dt;
      lastX = e.clientX; lastT = e.timeStamp;
      reelX = rubberBand(startReelX + dx);
      applyReelX();
      updateItemDepth();
    }
  });

  carouselTrack.addEventListener("pointerup", e => {
    if (e.pointerId !== pid) return;
    carouselTrack.releasePointerCapture(e.pointerId);
    carouselTrack.classList.remove("dragging");
    pid = -1;
    if (!dragging) return;
    dragging = false;
    // Clamp velocity
    const v = Math.max(-4, Math.min(4, velocity)) * 16; // px/frame
    if (Math.abs(v) > 2) {
      startMomentum(v);
    } else {
      snapToIndex(nearestItemIndex(), true);
    }
  });

  carouselTrack.addEventListener("pointercancel", () => {
    carouselTrack.classList.remove("dragging");
    pid = -1; dragging = false;
    snapToIndex(nearestItemIndex(), true);
  });

  function startMomentum(v) {
    let vel = v;
    const lo = minX(), hi = maxX();
    (function tick() {
      vel *= FRICTION;
      reelX += vel;
      // If past boundaries, kill momentum and snap
      if (reelX < lo || reelX > hi) {
        reelX = clamp(reelX, lo, hi);
        applyReelX(); updateItemDepth();
        snapToIndex(nearestItemIndex(), true);
        return;
      }
      applyReelX(); updateItemDepth();
      if (Math.abs(vel) < 0.3) {
        snapToIndex(nearestItemIndex(), true);
        return;
      }
      momentumRaf = requestAnimationFrame(tick);
    })();
  }
})();

// Mouse wheel — step by 1
carouselTrack.addEventListener("wheel", e => {
  e.preventDefault();
  const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  if (delta > 0 && selectedCardIndex < usulNames.length - 1) {
    const idx = selectedCardIndex + 1;
    selectCarouselCard(idx);
    snapToIndex(idx, true);
  } else if (delta < 0 && selectedCardIndex > 0) {
    const idx = selectedCardIndex - 1;
    selectCarouselCard(idx);
    snapToIndex(idx, true);
  }
}, { passive: false });

// Arrow buttons with hold-to-repeat
function addHoldRepeat(btn, action) {
  let timer = null, rid = null, running = false;
  const DELAY = 250, RAMP = 660, IV0 = 400, IV1 = 25;
  const stop = () => { running = false; clearTimeout(timer); clearTimeout(rid); timer = rid = null; };
  btn.addEventListener("pointerdown", e => {
    if (e.button !== 0) return;
    action(); running = true;
    btn.setPointerCapture(e.pointerId);
    const t0 = performance.now() + DELAY;
    timer = setTimeout(function step() {
      if (!running) return;
      action();
      const t = Math.min((performance.now() - t0) / RAMP, 1);
      rid = setTimeout(step, IV0 + (IV1 - IV0) * t * t);
    }, DELAY);
  });
  btn.addEventListener("pointerup", stop);
  btn.addEventListener("pointercancel", stop);
  btn.addEventListener("lostpointercapture", stop);
}
addHoldRepeat(document.getElementById("carPrev"), () => {
  if (selectedCardIndex > 0) {
    const idx = selectedCardIndex - 1;
    selectCarouselCard(idx);
    snapToIndex(idx, true);
  }
});
addHoldRepeat(document.getElementById("carNext"), () => {
  if (selectedCardIndex < usulNames.length - 1) {
    const idx = selectedCardIndex + 1;
    selectCarouselCard(idx);
    snapToIndex(idx, true);
  }
});

// Hold-to-repeat for +/- buttons
function holdButton(btn, fn) {
  let tid, rid, running = false;
  const DELAY = 400, RAMP = 660, IV0 = 320, IV1 = 20;
  function start(e) {
    e.preventDefault(); fn(); running = true;
    const t0 = performance.now() + DELAY;
    tid = setTimeout(function step() {
      if (!running) return;
      fn();
      const t = Math.min((performance.now() - t0) / RAMP, 1);
      rid = setTimeout(step, IV0 + (IV1 - IV0) * t * t);
    }, DELAY);
  }
  function stop() { running = false; clearTimeout(tid); clearTimeout(rid); }
  btn.addEventListener("pointerdown", start);
  btn.addEventListener("pointerup", stop);
  btn.addEventListener("pointerleave", stop);
  btn.addEventListener("pointercancel", stop);
}

// ── Vertical Reel Spinbox ──────────────────────────────────────
function initVReel(inputEl, setValueFn) {
  const ROW_H = 16, CELLS = 5;
  const mn = Number(inputEl.min) || 0, mx = Number(inputEl.max) || 999;

  // Hide adjacent step buttons
  const exp = inputEl.closest('.group-expand');
  if (exp) exp.querySelectorAll('.bpm-step-btn').forEach(b => { b.style.display = 'none'; });

  // Convert spinbox-wrap to vreel
  const wrap = inputEl.closest('.spinbox-wrap');
  wrap.classList.add('vreel');
  const win = document.createElement('div');
  win.className = 'vreel-window';
  const rl = document.createElement('div');
  rl.className = 'vreel-reel';
  const cells = [];
  for (let i = 0; i < CELLS; i++) {
    const c = document.createElement('span');
    c.className = 'vreel-cell';
    rl.appendChild(c); cells.push(c);
  }
  win.appendChild(rl);
  wrap.insertBefore(win, wrap.firstChild);

  let sp = 0, vel = 0, aid = null, drg = false, sy, ly, lt;
  const FR = 0.92, SPR = 0.14;

  function gv() { return Number(inputEl.value); }

  const ADEG = 30, WRAD = 32;
  const grp = inputEl.closest('.slider-group') || inputEl.closest('.render-row');
  const isRenderRow = grp && grp.classList.contains('render-row');
  function getFlipX() {
    if (isRenderRow) return document.body.dataset.compact === 'true' ? -1 : 1;
    return grp && grp.dataset.expand === 'ltr' ? -1 : 1;
  }
  function render() {
    const fx = getFlipX();
    const eff = gv() - sp / ROW_H;
    const dc = clamp(Math.round(eff), mn, mx);
    const fr = eff - dc;
    for (let i = 0; i < CELLS; i++) {
      const val = dc - 2 + i;
      cells[i].textContent = (val >= mn && val <= mx) ? val : '';
      const dist = (i - 2) - fr;
      const a = dist * ADEG * Math.PI / 180;
      const y = WRAD * Math.sin(a);
      const x = fx * WRAD * (Math.cos(a) - 1);
      const sy = Math.cos(a);
      const d = Math.abs(dist), t = Math.min(d / 2, 1);
      cells[i].style.opacity = 1 - t * 0.7;
      cells[i].style.fontWeight = t < 0.35 ? '700' : '400';
      cells[i].style.color = t < 0.35 ? 'var(--text)' : '';
      cells[i].style.transform = 'translate(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px) scaleY(' + sy.toFixed(3) + ')';
    }
  }

  function commit(nv) {
    nv = clamp(Math.round(nv), mn, mx);
    sp = 0; aid = null;
    if (setValueFn) setValueFn(nv);
    else inputEl.value = nv;
    render();
  }

  function snap() {
    cancel();
    const eff = gv() - sp / ROW_H;
    const tgt = clamp(Math.round(eff), mn, mx);
    const tpx = (gv() - tgt) * ROW_H;
    (function tick() {
      sp += (tpx - sp) * SPR;
      if (Math.abs(tpx - sp) < 0.4) { commit(tgt); return; }
      render();
      aid = requestAnimationFrame(tick);
    })();
  }

  function mom() {
    cancel();
    (function tick() {
      sp += vel * ROW_H;
      vel *= FR;
      const eff = gv() - sp / ROW_H;
      if (eff < mn - 0.3 || eff > mx + 0.3 || Math.abs(vel) < 0.02) { snap(); return; }
      render();
      aid = requestAnimationFrame(tick);
    })();
  }

  function cancel() { if (aid) { cancelAnimationFrame(aid); aid = null; } }

  // Pointer drag
  win.addEventListener('pointerdown', e => {
    e.preventDefault(); cancel();
    drg = false; sy = ly = e.clientY; lt = performance.now(); vel = 0;
    win.setPointerCapture(e.pointerId);
  });
  win.addEventListener('pointermove', e => {
    if (sy == null) return;
    if (!drg && Math.abs(e.clientY - sy) > 4) drg = true;
    if (drg) {
      e.preventDefault();
      const dy = e.clientY - ly, dt = Math.max(1, performance.now() - lt);
      const eff = gv() - sp / ROW_H;
      const bound = (eff <= mn && dy > 0) || (eff >= mx && dy < 0);
      sp += dy * (bound ? 0.25 : 1);
      vel = (dy / ROW_H) / (dt / 16);
      ly = e.clientY; lt = performance.now();
      render();
    }
  });
  win.addEventListener('pointerup', e => {
    if (sy == null) return;
    const was = drg; sy = null; drg = false;
    if (!was) { enterEdit(); return; }
    Math.abs(vel) > 0.15 ? mom() : snap();
  });
  win.addEventListener('pointercancel', () => { sy = null; drg = false; snap(); });

  // Wheel
  win.addEventListener('wheel', e => {
    e.preventDefault(); cancel();
    const dir = e.deltaY > 0 ? -1 : 1;
    const nv = clamp(gv() + dir, mn, mx);
    if (nv === gv()) return;
    const tpx = (gv() - nv) * ROW_H;
    (function tick() {
      sp += (tpx - sp) * SPR;
      if (Math.abs(tpx - sp) < 0.4) { commit(nv); return; }
      render();
      aid = requestAnimationFrame(tick);
    })();
  }, {passive: false});

  // Tap to edit
  function enterEdit() {
    const ed = document.createElement('input');
    ed.className = 'vreel-edit';
    ed.type = 'number'; ed.min = mn; ed.max = mx;
    ed.value = gv(); ed.inputMode = 'numeric';
    win.appendChild(ed); ed.focus(); ed.select();
    function done() {
      if (!ed.parentNode) return;
      const nv = clamp(Number(ed.value) || gv(), mn, mx);
      ed.remove(); commit(nv);
    }
    ed.addEventListener('blur', done);
    ed.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); ed.blur(); }
      if (e.key === 'Escape') { ed.value = gv(); ed.blur(); }
    });
  }

  // Auto-sync when value set externally
  const desc = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
  Object.defineProperty(inputEl, 'value', {
    get() { return desc.get.call(this); },
    set(v) { desc.set.call(this, v); if (!aid && !drg) render(); }
  });

  render();
  return render;
}

// Min width for all 4 groups open + VUR + padding + gaps in a single row
const COMPACT_BREAKPOINT = 880;
let wasCompact = null;
function alignControlButtons() {
  if (document.body.dataset.compact !== 'true') return;
  var ctrl = document.querySelector('.controls');
  var tekBtn = document.querySelector('#tekGroup .mute-label');
  var themeBtn = document.querySelector('.theme-btn');
  if (!ctrl || !tekBtn || !themeBtn) return;
  ctrl.style.setProperty('--align-x', '0px');
  ctrl.offsetHeight; // force reflow so both measurements use --align-x:0
  var themeR = themeBtn.getBoundingClientRect();
  if (themeR.width === 0) return;
  var tekR = tekBtn.getBoundingClientRect();
  var offset = (themeR.left + themeR.width / 2) - (tekR.left + tekR.width / 2);
  ctrl.style.setProperty('--align-x', offset + 'px');
}

function updateCompactMode() {
  const isNowCompact = window.innerWidth < COMPACT_BREAKPOINT;
  document.body.dataset.compact = String(isNowCompact);

  if (isNowCompact === wasCompact) {
    if (isNowCompact) alignControlButtons();
    return;
  }
  const prev = wasCompact;
  wasCompact = isNowCompact;
  vreelRenderers.forEach(fn => fn());

  const ctrl2 = document.getElementById("controlsPanel2");
  const rp = document.getElementById("renderPanel");
  const vg = document.getElementById("volumeGroup");
  const footer = document.querySelector(".app-footer");

  if (isNowCompact) {
    // Close any desktop-open groups before switching to mobile layout
    document.querySelectorAll('.slider-group.open, #renderPanel.open').forEach(g => g.classList.remove('open'));
    // Move renderPanel into controls, volumeGroup into mode-group
    ctrl2.appendChild(rp);
    const modeGrp = document.querySelector(".mode-group");
    modeGrp.appendChild(vg);
    // Move renderStatus into controls for marquee positioning
    const ctrl = document.querySelector(".controls");
    const rs = document.getElementById("renderStatus");
    ctrl.appendChild(rs);
    document.getElementById("controlsPanel").classList.add("open");
    ctrl2.classList.add("open");
    rp.classList.add("panel-visible", "open");
    const fBtn = document.getElementById("footerToggle");
    fBtn.setAttribute("aria-expanded", "true");
    fBtn.setAttribute("data-touched", "");
    const pr = fBtn.querySelector(".toggle-cell--right");
    if (pr) pr.style.opacity = "0";
    requestAnimationFrame(() => requestAnimationFrame(alignControlButtons));
  } else if (prev !== null) {
    // Restore: renderPanel back to footer, volumeGroup back to controlsPanel2
    footer.insertBefore(rp, footer.querySelector(".footer-right"));
    ctrl2.appendChild(vg);
    // Move renderStatus back to footer-center
    const rs = document.getElementById("renderStatus");
    rs.innerHTML = ""; rs.classList.remove("fading", "marquee");
    document.querySelector(".footer-center").insertBefore(rs, document.getElementById("footerToggle"));
    rp.classList.remove("panel-visible", "open", "entering", "exiting");
    vg.classList.remove("vol-knob", "vol-sliding", "entering", "exiting");
    document.getElementById("controlsPanel").classList.remove("open", "entering", "exiting");
    ctrl2.classList.remove("open", "entering", "exiting");
    const fBtn = document.getElementById("footerToggle");
    fBtn.setAttribute("aria-expanded", "false");
    const pr = fBtn.querySelector(".toggle-cell--right");
    if (pr) pr.style.opacity = "";
  }
}

// ── Animated mobile menu toggle (height-driven) ──
function toggleMobileMenu(forceOpen) {
  if (menuAnimating) return;
  const p1 = document.getElementById("controlsPanel");
  const p2 = document.getElementById("controlsPanel2");
  const panel = document.getElementById("renderPanel");
  const modeGrp = document.querySelector(".mode-group");
  const vg = document.getElementById("volumeGroup");
  const btn = document.getElementById("footerToggle");
  const ctrl = document.querySelector(".controls");
  const footer = document.querySelector(".app-footer");
  const isOpen = panel.classList.contains("panel-visible");
  const shouldOpen = forceOpen !== undefined ? forceOpen : !isOpen;
  if (shouldOpen === isOpen) return;

  btn.setAttribute("data-touched", "");
  menuAnimating = true;
  const DURATION = 340;
  const EASING = "cubic-bezier(.22,1,.36,1)";
  const pillRight = btn.querySelector(".toggle-cell--right");

const vizArea = document.querySelector('.viz-area');
  const vurBtn = document.getElementById('toggle');
  const carousel = document.querySelector('.carousel');
  const body = document.body;

  if (shouldOpen) {
    // Move renderStatus into controls for marquee positioning
    const rs = document.getElementById("renderStatus");
    ctrl.appendChild(rs);

    // 1. Measure pre-open row heights
    const footerH0 = footer.getBoundingClientRect().height;
    const ctrlH0 = ctrl.getBoundingClientRect().height;

    // 2. Make content visible (layout recalcs but not yet rendered)
    p1.classList.add("open", "entering");
    p2.classList.add("open", "entering");
    panel.classList.add("panel-visible", "open", "entering");
    modeGrp.classList.add("entering");
    btn.setAttribute("aria-expanded", "true");
    if(pillRight) pillRight.style.opacity = "0";

    // 3. Measure post-open row heights (forces sync layout)
    const vurH = vurBtn.getBoundingClientRect().height;
    const carH = carousel.getBoundingClientRect().height;
    const ctrlH1 = ctrl.getBoundingClientRect().height;
    const footerH1 = footer.getBoundingClientRect().height;
    const totalH = body.getBoundingClientRect().height;
    const vizH0 = totalH - vurH - carH - ctrlH0 - footerH0;
    const vizH1 = totalH - vurH - carH - ctrlH1 - footerH1;

    // 4. Lock grid at pre-open state, clip overflow
    ctrl.style.overflow = "hidden";
    footer.style.overflow = "hidden";
    body.style.gridTemplateRows = `${vizH0}px ${vurH}px ${carH}px ${ctrlH0}px ${footerH0}px`;
    body.offsetHeight; // force reflow to commit pre-open state

    // 5. Animate grid rows to post-open state
    body.style.transition = `grid-template-rows ${DURATION}ms ${EASING}`;
    body.style.gridTemplateRows = `${vizH1}px ${vurH}px ${carH}px ${ctrlH1}px ${footerH1}px`;

    setTimeout(() => {
      body.style.transition = "";
      body.style.gridTemplateRows = "";
      ctrl.style.overflow = "";
      footer.style.overflow = "";
      p1.classList.remove("entering");
      p2.classList.remove("entering");
      panel.classList.remove("entering");
      modeGrp.classList.remove("entering");
      menuAnimating = false;
      alignControlButtons();
      centerCarousel();
    }, DURATION + 20);

  } else {
    // 1. Measure open row heights
    const vurH = vurBtn.getBoundingClientRect().height;
    const carH = carousel.getBoundingClientRect().height;
    const ctrlH0 = ctrl.getBoundingClientRect().height;
    const footerH0 = footer.getBoundingClientRect().height;
    const vizH0 = vizArea.getBoundingClientRect().height;

    // 2. Calculate closed footer height
    footer.style.overflow = "hidden";
    const toggleH = btn.getBoundingClientRect().height;
    const footerStyle = getComputedStyle(footer);
    const footerH1 = Math.max(
      toggleH + parseFloat(footerStyle.paddingTop) + parseFloat(footerStyle.paddingBottom),
      parseFloat(footerStyle.minHeight) || 0
    );
    footer.style.overflow = "";

    const totalH = body.getBoundingClientRect().height;
    const vizH1 = totalH - vurH - carH - 0 - footerH1;

    // 3. Start exit animations, clip overflow
    ctrl.style.overflow = "hidden";
    footer.style.overflow = "hidden";
    p1.classList.add("exiting");
    p2.classList.add("exiting");
    panel.classList.add("exiting");
    modeGrp.classList.add("exiting");

    // 4. Lock grid at open state
    body.style.gridTemplateRows = `${vizH0}px ${vurH}px ${carH}px ${ctrlH0}px ${footerH0}px`;
    body.offsetHeight; // force reflow to commit open state

    // 5. Animate grid rows to closed state
    body.style.transition = `grid-template-rows ${DURATION}ms ${EASING}`;
    body.style.gridTemplateRows = `${vizH1}px ${vurH}px ${carH}px 0px ${footerH1}px`;

    setTimeout(() => {
      body.style.transition = "";
      body.style.gridTemplateRows = "";
      ctrl.style.overflow = "";
      footer.style.overflow = "";
      p1.classList.remove("open", "exiting");
      p2.classList.remove("open", "exiting");
      panel.classList.remove("panel-visible", "open", "exiting");
      modeGrp.classList.remove("exiting");
      btn.setAttribute("aria-expanded", "false");
      const rs = document.getElementById("renderStatus");
      rs.innerHTML = ""; rs.classList.remove("fading", "marquee");
      document.querySelector(".footer-center").insertBefore(rs, document.getElementById("footerToggle"));
      if(pillRight){pillRight.offsetWidth;pillRight.style.opacity="1";}
      menuAnimating = false;
      centerCarousel();
    }, DURATION + 20);
  }
}

// Swipe gesture + click on footer handle
(function() {
  const handle = document.getElementById("footerToggle");
  const ctrl = document.querySelector(".controls");
  const footer = document.querySelector(".app-footer");
  const chev = handle.querySelector(".toggle-chev");
  let startY = 0, dragging = false, skipClick = false;
  let swipeIsOpen = false, swipePR = null;
  const THRESHOLD = 30;

  function isSwipeTarget(el) {
    if (handle.contains(el)) return true;
    if (!document.getElementById("renderPanel").classList.contains("panel-visible")) return false;
    if (el.closest('button, input, a, select, .group-icon, .mute-label, .spinbox-wrap, .vreel-window, .vol-ring, #volumeGroup.vol-knob, .carousel, .footer-left, .footer-right')) return false;
    if (el.closest('.controls, .app-footer')) return true;
    return false;
  }

  function springChev() {
    const rot = swipeIsOpen ? 'rotate(180deg)' : '';
    chev.style.transition = "transform .3s cubic-bezier(.34,1.56,.64,1)";
    chev.style.transform = rot;
    setTimeout(() => { chev.style.transition = ""; chev.style.transform = ""; }, 300);
  }

  function resetCtrl() {
    ctrl.style.transform = "";
    ctrl.style.opacity = "";
    ctrl.style.transition = "";
  }

  function springCtrl() {
    ctrl.style.transition = "transform .3s cubic-bezier(.22,1,.36,1), opacity .3s ease";
    ctrl.style.transform = "";
    ctrl.style.opacity = "";
    setTimeout(resetCtrl, 300);
  }

  document.addEventListener("pointerdown", e => {
    if (document.body.dataset.compact !== "true" || menuAnimating) return;
    if (!isSwipeTarget(e.target)) return;
    startY = e.clientY; dragging = true;
    const captureEl = handle.contains(e.target) ? handle : e.target;
    captureEl.setPointerCapture(e.pointerId);
    if (chev) chev.style.transition = "";
    swipeIsOpen = document.getElementById("renderPanel").classList.contains("panel-visible");
    swipePR = handle.querySelector(".toggle-cell--right");
  }, true);

  document.addEventListener("pointermove", e => {
    if (!dragging) return;
    e.preventDefault();
    const dy = e.clientY - startY;
    if (chev) {
      const rot = swipeIsOpen ? 'rotate(180deg) ' : '';
      chev.style.transform = rot + `translateY(${dy * 0.45}px)`;
    }
    if (swipePR) {
      const p = Math.min(1, Math.abs(dy) / THRESHOLD);
      if (!swipeIsOpen && dy < 0) swipePR.style.opacity = String(1 - p);
      else if (swipeIsOpen && dy > 0) swipePR.style.opacity = String(p);
    }
    // Sync controls slide during close swipe
    if (swipeIsOpen && dy > 0) {
      const slide = Math.min(dy * 0.5, 60);
      ctrl.style.transform = `translateY(${slide}px)`;
      ctrl.style.opacity = String(Math.max(0.3, 1 - dy / 200));
    }
  }, true);

  document.addEventListener("pointerup", e => {
    if (!dragging) return;
    dragging = false;
    const dy = e.clientY - startY;
    if (chev) springChev();
    if (Math.abs(dy) >= THRESHOLD) {
      if (dy < -THRESHOLD && !swipeIsOpen) { toggleMobileMenu(true); skipClick = true; }
      else if (dy > THRESHOLD && swipeIsOpen) { resetCtrl(); toggleMobileMenu(false); skipClick = true; }
      else if (swipePR) { swipePR.style.opacity = swipeIsOpen ? "0" : ""; springCtrl(); }
    } else {
      if (swipePR) swipePR.style.opacity = swipeIsOpen ? "0" : "";
      springCtrl();
    }
  }, true);

  document.addEventListener("pointercancel", () => {
    if (!dragging) return;
    dragging = false;
    if (chev) springChev();
    if (swipePR) swipePR.style.opacity = swipeIsOpen ? "0" : "";
    springCtrl();
  }, true);

  handle.addEventListener("click", () => {
    if (skipClick) { skipClick = false; return; }
    if (document.body.dataset.compact === "true") toggleMobileMenu();
  });
})();

(function() {
  const SWIPE_CLOSE_PX = 30; // min drag distance (reserved for future use)

  const expandGroups = document.querySelectorAll("[data-expand]");

  // ── Generic open/close helpers ──
  function openGroup(group) { group.classList.add("open"); }
  function closeGroup(group) { group.classList.remove("open"); }
  function isOpen(group) { return group.classList.contains("open"); }

  // ── 1) Click-to-toggle for non-volume groups ──
  // For BPM: click on bpmIcon toggles
  // For TEK: click on tekMute toggles (when closed → open; when open → mute function)
  // For DÜM: click on dumMute toggles (when closed → open; when open → mute function)
  // For Render: click on renderWavBtn toggles (when closed → open; when open → render function)

  function setupGroupToggle(group, triggerEl, actionFn) {
    triggerEl.addEventListener("click", (e) => {
      if (group.id === "volumeGroup") return; // volume handled separately
      if (!isOpen(group)) {
        e.preventDefault();
        e.stopImmediatePropagation();
        openGroup(group);
      }
      // If already open, let the original handler run (mute, render, etc.)
    }, true); // capture phase to intercept before existing handlers
  }

  function isCompact() { return document.body.dataset.compact === "true"; }

  // BPM group: clock icon opens when closed; when open, tap-tempo runs (close via handle)
  const bpmGroup = document.getElementById("bpmGroup");
  const bpmIcon = document.getElementById("bpmIcon");
  bpmIcon.addEventListener("click", (e) => {

    if (!isOpen(bpmGroup)) {
      e.stopImmediatePropagation();
      bpmPulsePaused = true;
      openGroup(bpmGroup);
    } else {
      bpmPulsePaused = false;
      startBpmPulse();
    }
  }, true);

  // TEK group: T button opens when closed
  const tekGroup = document.getElementById("tekGroup");
  const tekMuteBtn = document.getElementById("tekMute");
  tekMuteBtn.addEventListener("click", (e) => {
    if (isCompact()) return; // mobile: always open, let mute run
    if (!isOpen(tekGroup)) {
      e.preventDefault();
      e.stopImmediatePropagation();
      openGroup(tekGroup);
    }
  }, true);

  // DÜM group: D button opens when closed
  const dumGroup = document.getElementById("dumGroup");
  const dumMuteBtn = document.getElementById("dumMute");
  dumMuteBtn.addEventListener("click", (e) => {
    if (isCompact()) return; // mobile: always open, let mute run
    if (!isOpen(dumGroup)) {
      e.preventDefault();
      e.stopImmediatePropagation();
      openGroup(dumGroup);
    }
  }, true);

  // Render group: download button opens when closed
  const renderPanel = document.getElementById("renderPanel");
  const renderBtn = document.getElementById("renderWavBtn");
  renderBtn.addEventListener("click", (e) => {
    if (isCompact()) return;
    if (!isOpen(renderPanel)) {
      e.preventDefault();
      e.stopImmediatePropagation();
      openGroup(renderPanel);
    } else {
      closeGroup(renderPanel);
    }
  }, true);

  // ── 2) Volume group: click = mute, hover = expand slider ──
  const volumeGroup = document.getElementById("volumeGroup");
  const volumeIconEl = document.getElementById("volumeIcon");

  // Desktop: hover to expand
  volumeIconEl.addEventListener("mouseenter", () => { if (!isCompact()) openGroup(volumeGroup); });
  volumeGroup.addEventListener("mouseleave", () => { if (!isCompact()) closeGroup(volumeGroup); });

  // Desktop: click = mute toggle
  volumeIconEl.addEventListener("click", () => {
    if (isCompact()) return; // compact handled by pointer events below
    if (volume > 0) { volumeBeforeMute = volume; setVolumeValue(0); }
    else { setVolumeValue(volumeBeforeMute || 100); }
  });

  // Compact: tap = mute, long-press = show slider + swipe
  (function() {
    const LONG_PRESS = 300;
    let lpTimer = null, isLong = false, startX = 0, startY = 0, startVol = 0;
    const volRing = volumeGroup.querySelector('.vol-ring');
    function updateKnob() {
      if (volRing) volRing.style.setProperty('--vol', String(volume / 100));
    }

    volumeIconEl.addEventListener("pointerdown", (e) => {
      if (!isCompact()) return;
      e.preventDefault();
      isLong = false;
      startX = e.clientX;
      startY = e.clientY;
      startVol = volume;
      lpTimer = setTimeout(() => {
        isLong = true;
        volumeGroup.classList.add("vol-knob");
        updateKnob();
        volumeIconEl.setPointerCapture(e.pointerId);
      }, LONG_PRESS);
    });

    volumeIconEl.addEventListener("pointermove", (e) => {
      if (!isLong) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const range = window.innerHeight * 0.3;
      const raw = startVol + ((dx - dy) / range) * 100;
      const newVol = Math.round(clamp(raw, 0, 100));
      if (raw > 100 || raw < 0) { startX = e.clientX; startY = e.clientY; startVol = newVol; }
      setVolumeValue(newVol);
      updateKnob();
    });

    function endPress(e) {
      if (!isCompact()) return;
      clearTimeout(lpTimer);
      if (isLong) {
        volumeGroup.classList.remove("vol-knob");
        isLong = false;
      } else {
        // Short tap → mute toggle
        if (volume > 0) { volumeBeforeMute = volume; setVolumeValue(0); }
        else { setVolumeValue(volumeBeforeMute || 100); }
        updateKnob();
      }
    }
    volumeIconEl.addEventListener("pointerup", endPress);
    volumeIconEl.addEventListener("pointercancel", endPress);
    updateKnob();
  })();

  // ── 3) Close mechanism: handle click ──
  expandGroups.forEach(group => {
    if (group.id === "volumeGroup") return;
    const handle = group.querySelector(".group-expand-handle");
    if (!handle) return;
    handle.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isOpen(group)) {
        if (group.id === "bpmGroup") { bpmPulsePaused = false; startBpmPulse(); }
        closeGroup(group);
      }
    });
  });

})();
</script>
</body>
</html>
